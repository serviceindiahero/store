// OWNER — ABC ANALYSIS (A=High Value, B=Medium, C=Low)
// ═══════════════════════════════════════════════════════════
async function rOwnerABC(){
  const pg=$('PG');
  pg.innerHTML='<div style="text-align:center;padding:60px;color:#94a3b8">⏳ Loading ABC Analysis…</div>';
  await ensureSalesLoaded();

  // Calculate annual consumption value for each item
  const rows=S.items.map(item=>{
    const sm=typeof S_SALES_MAP!=='undefined'?S_SALES_MAP[item.partNo]:null;
    const totalSales=sm?Object.values(sm).reduce((a,b)=>a+b,0):0;
    const dlc=parseFloat(item.dlc)||0;
    const annualValue=totalSales*dlc;
    const sysQty=parseFloat(item.systemQty)||0;
    return{...item,totalSales,annualValue,dlc,sysQty,stockVal:sysQty*dlc};
  }).sort((a,b)=>b.annualValue-a.annualValue);

  const totalAV=rows.reduce((s,r)=>s+r.annualValue,0);
  // ABC classification: A=top 70% value, B=next 20%, C=bottom 10%
  let cumVal=0;
  rows.forEach(r=>{
    cumVal+=r.annualValue;
    const pct=totalAV?cumVal/totalAV:0;
    r.abc=pct<=0.70?'A':pct<=0.90?'B':'C';
  });
  const aItems=rows.filter(r=>r.abc==='A');
  const bItems=rows.filter(r=>r.abc==='B');
  const cItems=rows.filter(r=>r.abc==='C');
  const aVal=aItems.reduce((s,r)=>s+r.annualValue,0);
  const bVal=bItems.reduce((s,r)=>s+r.annualValue,0);
  const cVal=cItems.reduce((s,r)=>s+r.annualValue,0);
  const fmtR=n=>'₹'+Math.round(n).toLocaleString('en-IN');

  let activeTab='A';
  function renderABCTable(items,cls){
    if(!items.length)return`<div style="padding:24px;text-align:center;color:#94a3b8">No items in this class</div>`;
    const clr={A:'#dc2626',B:'#d97706',C:'#059669'}[cls]||'#64748b';
    return`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:480px">
      <thead><tr style="background:#f8fafc">
        <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap">#</th>
        <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Part No</th>
        <th style="padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Description</th>
        <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Sales Qty</th>
        <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Annual Value</th>
        <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Stock</th>
        <th style="padding:8px 12px;text-align:right;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Stock Value</th>
        <th style="padding:8px 12px;text-align:center;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0">Class</th>
      </tr></thead>
      <tbody>${items.slice(0,100).map((r,i)=>`<tr style="border-bottom:1px solid #f1f5f9">
        <td style="padding:8px 12px;font-size:10px;color:#94a3b8">${i+1}</td>
        <td style="padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#2563eb">${esc(r.partNo)}</td>
        <td style="padding:8px 12px;font-size:11px">${esc(tr2(r.desc||'—',22))}</td>

        <td style="padding:8px 12px;text-align:right;font-weight:700;color:${clr}">${fmtR(r.annualValue)}</td>

// OWNER — FMS REPORT (Fast/Medium/Slow Moving Stock)
// ═══════════════════════════════════════════════════════════
async function rOwnerFMS(){
  const pg=$('PG');
  pg.innerHTML='<div style="text-align:center;padding:60px;color:#94a3b8">⏳ Loading FMS Report…</div>';
  await ensureSalesLoaded();

  const hasSales=typeof S_SALES_MAP!=='undefined'&&Object.keys(S_SALES_MAP).length>0;
  const months=typeof S_SALES_META!=='undefined'&&S_SALES_META?S_SALES_META.months?.length||1:1;

  const rows=S.items.map(item=>{
    const sm=hasSales?S_SALES_MAP[item.partNo]:null;
    const totalSales=sm?Object.values(sm).reduce((a,b)=>a+b,0):0;
    const avgMonthly=months>0?totalSales/months:0;
    const dlc=parseFloat(item.dlc)||0;
    const sysQty=parseFloat(item.systemQty)||0;
    const coverDays=avgMonthly>0?Math.round(sysQty/(avgMonthly/30)):null;
    // FMS Classification
    let fms,fmsColor,fmsBg;
    if(totalSales===0){fms='Non-Moving';fmsColor='#94a3b8';fmsBg='#f8fafc';}
    else if(avgMonthly>=5){fms='Fast';fmsColor='#059669';fmsBg='#ecfdf5';}
    else if(avgMonthly>=1){fms='Medium';fmsColor='#d97706';fmsBg='#fffbeb';}
    else{fms='Slow';fmsColor='#dc2626';fmsBg='#fef2f2';}
    return{...item,totalSales,avgMonthly,dlc,sysQty,stockVal:sysQty*dlc,coverDays,fms,fmsColor,fmsBg};
  });

  const fast=rows.filter(r=>r.fms==='Fast');
  const medium=rows.filter(r=>r.fms==='Medium');
  const slow=rows.filter(r=>r.fms==='Slow');
  const nonMoving=rows.filter(r=>r.fms==='Non-Moving');
  const fmtR=n=>'₹'+Math.round(n).toLocaleString('en-IN');

  function fmsTable(items){
    if(!items.length)return`<div style="padding:24px;text-align:center;color:#94a3b8">No items in this category</div>`;
    return`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:480px">
      <thead><tr style="background:#f8fafc">
        ${['#','Part No','Description','Bin','Avg/Month','Total Sales','Stock Qty','Cover Days','Classification'].map(h=>`<th style="padding:8px 11px;text-align:left;font-size:10px;font-weight:700;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${items.slice(0,100).map((r,i)=>`<tr style="border-bottom:1px solid #f1f5f9;background:${i%2?'#fafbfc':'#fff'}">
        <td style="padding:7px 11px;font-size:10px;color:#94a3b8">${i+1}</td>
        <td style="padding:7px 11px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#2563eb">${esc(r.partNo)}</td>
        <td style="padding:7px 11px;font-size:11px">${esc(tr2(r.desc||'—',20))}</td>
        <td style="padding:7px 11px"><span style="background:#eff6ff;color:#2563eb;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700">${esc(r.bin||'—')}</span></td>
        <td style="padding:7px 11px;font-weight:700;color:${r.fmsColor}">${r.avgMonthly.toFixed(1)}</td>
        <td style="padding:7px 11px;font-family:'JetBrains Mono',monospace;font-weight:700">${r.totalSales}</td>
        <td style="padding:7px 11px;font-family:'JetBrains Mono',monospace">${r.sysQty}</td>
        <td style="padding:7px 11px;font-weight:700;color:${r.coverDays!==null?(r.coverDays<15?'#dc2626':r.coverDays<30?'#d97706':'#059669'):'#94a3b8'}">${r.coverDays!==null?r.coverDays+'d':'∞'}</td>
        <td style="padding:7px 11px"><span style="padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:${r.fmsBg};color:${r.fmsColor};border:1px solid ${r.fmsColor}44">${r.fms}</span></td>
      </tr>`).join('')}
      ${items.length>100?`<tr><td colspan="9" style="padding:8px;text-align:center;font-size:10px;color:#94a3b8">+${items.length-100} more</td></tr>`:''}</tbody>
    </table></div>`;
  }

  pg.innerHTML=`
  <div class="ph"><div><div class="pt">⚡ FMS Report</div><div class="ps">Fast / Medium / Slow / Non-Moving stock classification · Based on ${months} months of sales data</div></div>
    <button class="btn bgh bsm" onclick="fmsExport()">⬇ Export CSV</button>
  </div>

  ${!hasSales?`<div class="al alw" style="margin-bottom:16px">⚠️ Sales data not loaded. Upload DMS CSV from DMS Upload page for accurate FMS classification.</div>`:''}

  <!-- Summary -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
    ${[
      {l:'Fast Moving',n:fast.length,c:'#059669',bg:'#ecfdf5',bd:'#a7f3d0',d:'Avg ≥ 5/month'},
      {l:'Medium Moving',n:medium.length,c:'#d97706',bg:'#fffbeb',bd:'#fde68a',d:'Avg 1-5/month'},
      {l:'Slow Moving',n:slow.length,c:'#dc2626',bg:'#fef2f2',bd:'#fecaca',d:'Avg <1/month'},
      {l:'Non Moving',n:nonMoving.length,c:'#94a3b8',bg:'#f8fafc',bd:'#e2e8f0',d:'Zero sales'}
    ].map(x=>`<div style="background:${x.bg};border:1.5px solid ${x.bd};border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${x.c}">${x.n}</div>
      <div style="font-size:10px;font-weight:700;color:${x.c};margin:3px 0;text-transform:uppercase;letter-spacing:.4px">${x.l}</div>
      <div style="font-size:9px;color:#94a3b8">${x.d}</div>
    </div>`).join('')}
  </div>

  <!-- FMS Tabs -->
  <div class="otab-bar" id="FMS_TABS">
    <button class="otab-btn on" onclick="fmsTab('fast')">⚡ Fast (${fast.length})</button>
    <button class="otab-btn" onclick="fmsTab('medium')">🟡 Medium (${medium.length})</button>
    <button class="otab-btn" onclick="fmsTab('slow')">🔴 Slow (${slow.length})</button>
    <button class="otab-btn" onclick="fmsTab('non')">⚫ Non-Moving (${nonMoving.length})</button>
  </div>
  <div class="ochart" id="FMS_TABLE">${fmsTable(fast)}</div>`;

  window._fmsData={fast,medium,slow,non:nonMoving,all:rows};
  window.fmsTab=function(t){
    document.querySelectorAll('#FMS_TABS .otab-btn').forEach((b,i)=>b.classList.toggle('on',['fast','medium','slow','non'][i]===t));
    const tbl=$('FMS_TABLE');if(tbl)tbl.innerHTML=fmsTable(window._fmsData[t]);
  };
}

window.fmsExport=function(){
  const rows=window._fmsData?.all||[];
  const csv='Part No,Description,Category,Bin,Total Sales,Avg Monthly,Stock Qty,Cover Days,FMS Class\n'
    +rows.map(r=>`"${r.partNo}","${(r.desc||'').replace(/"/g,'""')}","${r.category||''}","${r.bin||''}",${r.totalSales},${r.avgMonthly.toFixed(2)},${r.sysQty},${r.coverDays||''},${r.fms}`).join('\n');
  dlCSV(csv,`fms_report_${today()}.csv`);
  toast('FMS Report exported','s');
};

  </div>

  <!-- Filter bar -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${['all','LOGIN','COUNT_SAVED','COUNT_DELETED','DELETE_REQUESTED','ITEM_EDITED'].map((f,i)=>
      `<button onclick="ownerFilterTrail('${f}')" style="padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid ${i===0?'#2563eb':'#e2e8f0'};background:${i===0?'#2563eb':'#fff'};color:${i===0?'#fff':'#64748b'};transition:.15s" id="OTF_${f}">${f==='all'?'All Events':f.replace(/_/g,' ')}</button>`
    ).join('')}

  <div id="OT_TABLE" class="ochart">${ownerRenderTrail(merged,'all',actionIcon,actionColor)}</div>`;

  window._ownerTrailData={entries:merged,actionIcon,actionColor};

    document.querySelectorAll('[id^="OTF_"]').forEach(b=>{b.style.background='#fff';b.style.color='#64748b';b.style.borderColor='#e2e8f0';});

    dlCSV(csv,`audit_trail_owner_${today()}.csv`);

        <td style="padding:8px 12px;font-size:10px;font-family:'JetBrains Mono',monospace;white-space:nowrap">

        <td style="padding:8px 12px;white-space:nowrap"><span style="font-size:11px;font-weight:700;color:${ac}">${ic} ${esc(t.action.replace(/_/g,' '))}</span></td>
        <td style="padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#2563eb">${esc(t.partNo||'—')}</td>
        <td style="padding:8px 12px;font-size:11px;color:#dc2626;max-width:100px;overflow:hidden;text-overflow:ellipsis">${esc(String(t.oldVal||'—').slice(0,20))}</td>

      </tr>`;

  </table></div>`;

async function approveRequest(reqId){
  const note=prompt('Approval note (optional):');
  const requests=window._approvalsData||[];
  const req=requests.find(r=>r.id===reqId);
  if(!req){toast('Request not found','w');return;}

  // Perform the actual delete
  const r=await api({action:'deleteCount',id:req.recordId});
  if(!r.success){toast('Delete failed: '+(r.error||'Unknown'),'d');return;}

  // Update request status
  req.status='approved';
  req.decidedBy=S.user?.name||S.user?.username||'';
  req.decidedAt=new Date().toISOString();
  req.decisionNote=note||'Approved';

  // Save updated status to sheets + local
  const pending=JSON.parse(localStorage.getItem('imPendingApprovals3')||'[]');
  const idx=pending.findIndex(p=>p.id===reqId);
  if(idx>=0)pending[idx]=req;
  localStorage.setItem('imPendingApprovals3',JSON.stringify(pending));
  if(S.online)api({action:'updateApprovalRequest',request:req}).catch(()=>{});

  logTrail('COUNT_DELETED',req.partNo,'',req.qty,'0',`Approved by ${req.decidedBy} — ${req.decisionNote}`);
  toast('✅ Approved and deleted','s',3000);
  renderApprovalsPage(requests);
}

async function rejectRequest(reqId){
  const note=prompt('Reason for rejection (required):');
  if(!note){toast('Rejection reason required','w');return;}
  const requests=window._approvalsData||[];
  const req=requests.find(r=>r.id===reqId);
  if(!req)return;

  req.status='rejected';
  req.decidedBy=S.user?.name||S.user?.username||'';
  req.decidedAt=new Date().toISOString();
  req.decisionNote=note;

  const pending=JSON.parse(localStorage.getItem('imPendingApprovals3')||'[]');
  const idx=pending.findIndex(p=>p.id===reqId);
  if(idx>=0)pending[idx]=req;
  localStorage.setItem('imPendingApprovals3',JSON.stringify(pending));
  if(S.online)api({action:'updateApprovalRequest',request:req}).catch(()=>{});

  logTrail('DELETE_REJECTED',req.partNo,'',req.qty,'Rejected',`By ${req.decidedBy} — ${note}`);
  toast('❌ Request rejected','w',3000);
  renderApprovalsPage(requests);
}


// ─── Built-in Root Cause Analysis ──────────────────────────
function imBuiltinRCA(parts){
  const findings=[];
  const r=n=>'₹'+Math.round(n).toLocaleString('en-IN');
  const short=parts.filter(p=>p.variance<0);
  const excess=parts.filter(p=>p.variance>0);

  // 1. Bin clustering — same bin has ≥2 shortages
  const binSh={};
  short.forEach(p=>{if(p.bin){if(!binSh[p.bin])binSh[p.bin]=[];binSh[p.bin].push(p);}});
  Object.entries(binSh).filter(([,ps])=>ps.length>=2).slice(0,2).forEach(([bin,ps])=>{
    const loss=ps.reduce((s,p)=>s+p.value,0);
    findings.push({type:'danger',title:`Bin ${bin} — Multiple Shortages`,
      rootCause:`${ps.length} parts in bin ${bin} are physically short. Possible: mis-placement, theft, or counting error in this section.`,
      affectedParts:ps.slice(0,4).map(p=>p.partNo),financialImpact:r(loss),
      action:`Re-count bin ${bin} immediately. If discrepancy persists, check CCTV and cross-verify with DMS billing.`});
  });

  // 2. High value shortage
  const hvShort=short.filter(p=>p.mrp>500).sort((a,b)=>b.value-a.value).slice(0,3);
  if(hvShort.length){
    findings.push({type:'danger',title:'High-Value Parts Short',
      rootCause:`${hvShort.length} expensive parts (MRP>₹500) have physical shortages. Most likely: unbilled issue, theft, or wrong DMS entry.`,
      affectedParts:hvShort.map(p=>p.partNo),financialImpact:r(hvShort.reduce((s,p)=>s+p.value,0)),
      action:`Cross-check these parts against last 7 days billing records and job cards. Lock them immediately.`});
  }

  // 3. Large single variance
  parts.filter(p=>Math.abs(p.variance)>=10).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance)).slice(0,2).forEach(p=>{
    findings.push({type:p.variance<0?'danger':'warning',title:`Large Variance — ${p.partNo}`,
      rootCause:`${p.partNo} has variance of ${p.variance} units (DMS: ${p.dms}, Physical: ${p.counted}). Large variances indicate systematic error — DMS issue, batch receipt not recorded, or counting error.`,
      affectedParts:[p.partNo],financialImpact:r(p.value),
      action:p.variance<0?`Check past billing/issue entries and pending GRNs for this part.`:`Check if recent stock receipt was entered in DMS. Verify physical count again.`});
  });

  // 4. Excess clustering — possible DMS not updated
  const binEx={};
  excess.forEach(p=>{if(p.bin){if(!binEx[p.bin])binEx[p.bin]=[];binEx[p.bin].push(p);}});
  Object.entries(binEx).filter(([,ps])=>ps.length>=2).slice(0,1).forEach(([bin,ps])=>{
    findings.push({type:'warning',title:`Excess Clustered in Bin ${bin}`,
      rootCause:`Multiple excess parts in bin ${bin}. Parts may be in wrong bin, or DMS not updated after receipt.`,
      affectedParts:ps.slice(0,4).map(p=>p.partNo),financialImpact:r(ps.reduce((s,p)=>s+p.value,0)),
      action:`Verify bin labels. Check pending GRN entries in DMS.`});
  });

  // 5. Small systematic shortages
  const smSh=short.filter(p=>p.variance>=-2);
  if(smSh.length>=4){
    findings.push({type:'warning',title:`Systematic Small Shortages (${smSh.length} parts)`,
      rootCause:`${smSh.length} parts each short 1-2 units. Pattern suggests: counting errors, parts in service bay, or piecemeal issues not billed.`,
      affectedParts:smSh.slice(0,4).map(p=>p.partNo),financialImpact:r(smSh.reduce((s,p)=>s+p.value,0)),
      action:`Re-count these parts physically. Check if any are in service bay or pending billing.`});
  }

  // 6. Accuracy finding
  const matchRate=parts.length?Math.round((parts.filter(p=>p.variance===0).length/parts.length)*100):0;
  findings.push({type:'info',title:`Overall Accuracy: ${matchRate}%`,
    rootCause:`${matchRate}% of audited parts match DMS exactly. Variances are concentrated in specific bins — ${Object.keys(binSh).slice(0,3).join(', ')||'multiple bins'}.`,
    affectedParts:[],financialImpact:'—',
    action:`Focus re-counts on flagged bins. Resolve high-value shortages first. Schedule follow-up count within 24 hours.`});

  // 7. Summary recommendation
  findings.push({type:'info',title:'Recommended Next Steps',
    rootCause:`${parts.length} variance items: ${short.length} short, ${excess.length} excess. Total financial exposure: ${r(parts.reduce((s,p)=>s+p.value,0))}.`,
    affectedParts:[],financialImpact:r(parts.reduce((s,p)=>s+p.value,0)),
    action:`1) Lock high-value short parts. 2) Re-count problem bins. 3) Cross-check DMS billing last 7 days. 4) Submit report to management.`});

  return findings.slice(0,8);
}

// FEATURE 1 — VARIANCE HEATMAP (bin-level visual analysis)
// ═══════════════════════════════════════════════════════════
async function rHeatmap(){
  const pg=$('PG');
  pg.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8">⏳ Building heatmap…</div>';
  const counts=await fetchCounts();
  const cMap={};
  counts.forEach(c=>{if(!cMap[c.partNo])cMap[c.partNo]=0;cMap[c.partNo]+=parseFloat(c.qty)||0;});

  // Build bin-level stats
  const binStats={};
  S.items.forEach(item=>{
    const b=item.bin||'No Bin';
    if(!binStats[b])binStats[b]={bin:b,total:0,counted:0,short:0,excess:0,match:0,shortVal:0,excessVal:0,parts:[]};
    binStats[b].total++;
    const cnt=cMap[item.partNo];
    if(cnt!==undefined){
      binStats[b].counted++;
      const dms=parseFloat(item.systemQty)||0;
      const dlc=parseFloat(item.dlc)||0;
      const diff=cnt-dms;
      if(diff<0){binStats[b].short++;binStats[b].shortVal+=Math.abs(diff)*dlc;}
      else if(diff>0){binStats[b].excess++;binStats[b].excessVal+=diff*dlc;}
      else binStats[b].match++;
    }
    binStats[b].parts.push(item.partNo);
  });

  const bins=Object.values(binStats).sort((a,b)=>b.shortVal+b.excessVal-(a.shortVal+a.excessVal));
  const maxVal=Math.max(...bins.map(b=>b.shortVal+b.excessVal),1);

  function heatColor(b){
    const v=b.shortVal+b.excessVal;
    const pct=v/maxVal;
    if(pct>0.7)return{bg:'#fef2f2',border:'#dc2626',text:'#dc2626',badge:'#dc2626'};
    if(pct>0.4)return{bg:'#fffbeb',border:'#d97706',text:'#d97706',badge:'#d97706'};
    if(pct>0.1)return{bg:'#fffcf0',border:'#f59e0b',text:'#d97706',badge:'#f59e0b'};
    if(b.counted===0)return{bg:'#f8fafc',border:'#e2e8f0',text:'#94a3b8',badge:'#94a3b8'};
    if(b.short===0&&b.excess===0&&b.counted>0)return{bg:'#ecfdf5',border:'#059669',text:'#059669',badge:'#059669'};
    return{bg:'#f0fdf4',border:'#a7f3d0',text:'#059669',badge:'#059669'};
  }

  const totShort=bins.reduce((s,b)=>s+b.short,0);
  const totExcess=bins.reduce((s,b)=>s+b.excess,0);
  const totShortVal=bins.reduce((s,b)=>s+b.shortVal,0);
  const totNotStarted=bins.filter(b=>b.counted===0).length;

  pg.innerHTML=`
  <div class="ph"><div><div class="pt">🔥 Variance Heatmap</div><div class="ps">Bin-level variance intensity · Red = high financial risk · Green = clean</div></div>
    <button class="btn bgh bsm" onclick="rHeatmap()">🔄 Refresh</button>
  </div>

  <!-- Summary -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
    <div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#dc2626">${totShort}</div>
      <div style="font-size:10px;font-weight:700;color:#dc2626;margin-top:3px">Short Across Bins</div>
      <div style="font-size:10px;color:#94a3b8">₹${Math.round(totShortVal).toLocaleString('en-IN')}</div>
    </div>
    <div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#d97706">${totExcess}</div>
      <div style="font-size:10px;font-weight:700;color:#d97706;margin-top:3px">Excess Across Bins</div>
    </div>
    <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#94a3b8">${totNotStarted}</div>
      <div style="font-size:10px;font-weight:700;color:#94a3b8;margin-top:3px">Bins Not Started</div>
    </div>
    <div style="background:#ecfdf5;border:1.5px solid #a7f3d0;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#059669">${bins.filter(b=>b.short===0&&b.excess===0&&b.counted>0).length}</div>
      <div style="font-size:10px;font-weight:700;color:#059669;margin-top:3px">Clean Bins</div>
    </div>
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;font-size:11px;font-weight:600">
    ${[['#dc2626','🔴 Critical Risk'],['#d97706','🟠 Moderate Risk'],['#f59e0b','🟡 Low Risk'],['#059669','🟢 Clean'],['#94a3b8','⚪ Not Started']].map(([c,l])=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:3px;background:${c};display:inline-block"></span><span style="color:#475569">${l}</span></span>`).join('')}
  </div>

  <!-- Heatmap grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
    ${bins.map(b=>{
      const col=heatColor(b);
      const pct=b.total?Math.round(b.counted/b.total*100):0;
      return`<div style="background:${col.bg};border:2px solid ${col.border};border-radius:12px;padding:12px;cursor:pointer;transition:.2s" onclick="hmShowBin('${esc(b.bin)}')">
        <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:#0f172a;margin-bottom:6px">${esc(b.bin)}</div>
        <div style="height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:8px">
          <div style="width:${pct}%;height:100%;background:${col.border};border-radius:4px"></div>
        </div>
        <div style="font-size:10px;color:#64748b;line-height:1.6">
          <span>${b.total} parts</span> · <span>${pct}% counted</span><br>
          ${b.short>0?`<span style="color:#dc2626;font-weight:700">🔻 ${b.short} short</span><br>`:''}
          ${b.excess>0?`<span style="color:#d97706;font-weight:700">🔺 ${b.excess} excess</span><br>`:''}
          ${b.short===0&&b.excess===0&&b.counted>0?`<span style="color:#059669;font-weight:700">✅ All clear</span>`:''}
          ${b.counted===0?`<span style="color:#94a3b8">⏳ Not started</span>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;

  window._hmBinStats=binStats;
  window.hmShowBin=function(binName){
    const b=window._hmBinStats[binName];if(!b)return;
    const parts=S.items.filter(i=>i.bin===binName).map(i=>{
      const cnt=cMap[i.partNo];const dms=parseFloat(i.systemQty)||0;
      const diff=cnt!==undefined?cnt-dms:null;
      return{pn:i.partNo,desc:i.desc||'',dms,cnt:cnt??null,diff};
    }).sort((a,b2)=>Math.abs(b2.diff||0)-Math.abs(a.diff||0));
    modal(`<div class="md mdlg"><div class="mdh"><div class="mdt">📍 ${esc(binName)} — ${b.total} parts</div><button class="mdc" onclick="closeMd()">✕</button></div>
    <div class="mdb" style="padding:0">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bd)">
        ${[['Short',b.short,'#dc2626'],['Excess',b.excess,'#d97706'],['Clean',b.match,'#059669']].map(([l,v,c])=>`<div style="padding:12px;text-align:center;border-right:1px solid var(--bd)">
          <div style="font-size:20px;font-weight:800;color:${c}">${v}</div><div style="font-size:10px;color:#64748b">${l}</div></div>`).join('')}
      </div>
      <div class="tw" style="max-height:400px;overflow-y:auto"><table>
        <thead><tr><th>Part No</th><th>Description</th><th>DMS</th><th>Counted</th><th>Variance</th></tr></thead>
        <tbody>${parts.map(p=>`<tr>
          <td class="tpn">${esc(p.pn)}</td>
          <td style="font-size:11px">${esc(tr2(p.desc,24))}</td>
          <td class="tq">${p.dms}</td>
          <td class="tq" style="color:${p.cnt===null?'#94a3b8':'#059669'}">${p.cnt??'—'}</td>
          <td class="tq" style="color:${p.diff===null?'#94a3b8':p.diff===0?'#059669':p.diff<0?'#dc2626':'#d97706'};font-weight:800">
            ${p.diff===null?'—':p.diff===0?'✅':p.diff<0?p.diff:'+'+p.diff}
          </td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div class="mdf"><button class="btn bgh" onclick="closeMd()">Close</button><button class="btn bpr bsm" onclick="closeMd();go('scan')">📷 Go Scan</button></div></div>`);
  };
}

const DT_KEY='imDailyTarget3';
function getDT(){try{return JSON.parse(localStorage.getItem(DT_KEY)||'{}')}catch{return{};}}
function saveDT(d){localStorage.setItem(DT_KEY,JSON.stringify(d));}

  pg.innerHTML=`

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div style="flex:1;min-width:160px">
          <label class="fll">Parts to count today *</label>
          <input class="fi" id="DT_INP" type="number" min="1" max="5000" value="${myTarget||''}" placeholder="e.g. 200">
        </div>
        <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">

        </div>
      </div>
      <button class="btn bpr" style="margin-top:12px" onclick="saveMyTarget()">Save Target</button>
    </div>
  </div>

  <!-- Recent scans today -->
  <div class="cd">
    <div class="cdh"><div class="cdt">📋 Today's Scans (${todayCounts.length} entries · ${done} parts)</div></div>
    <div class="tw" style="max-height:360px;overflow-y:auto"><table>
      <thead><tr><th>Time</th><th>Part No</th><th>Description</th><th>Qty</th><th>Bin</th></tr></thead>
      <tbody>${todayCounts.length?[...todayCounts].reverse().slice(0,50).map(c=>`<tr>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px">${(c.time||'').slice(0,5)}</td>
        <td class="tpn">${esc(c.partNo)}</td>
        <td style="font-size:11px">${esc(tr2(c.desc||'—',24))}</td>

function saveMyTarget(){
  const v=parseInt($('DT_INP')?.value)||0;
  if(!v||v<1){toast('Enter a valid target','w');return;}
  const dt=getDT();
  if(!dt[S.user.username])dt[S.user.username]={};
  dt[S.user.username].target=v;
  dt[S.user.username].date=today();
  saveDT(dt);
  toast(`Target set: ${v} parts for today 🎯`,'s');
  rDailyTarget();
}

// FEATURE 3 — PART HISTORY VIEWER (tap any part → full history)
// Shows all audit dates, all users, trend chart
// ═══════════════════════════════════════════════════════════
function showPartHistory(partNo){
  const item=S.items.find(i=>i.partNo===partNo);
  if(!item&&!partNo)return;
  const counts=S.allCounts||S.counts||[];
  const partCounts=counts.filter(c=>c.partNo===partNo).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  // Group by date
  const byDate={};
  partCounts.forEach(c=>{
    if(!byDate[c.date])byDate[c.date]=[];
    byDate[c.date].push(c);
  });
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const dms=parseFloat(item?.systemQty)||0;
  const dlc=parseFloat(item?.dlc)||0;

  modal(`<div class="md mdlg"><div class="mdh">
    <div><div class="mdt">📈 ${esc(partNo)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${esc(item?.desc||'')} · Bin: ${esc(item?.bin||'—')}</div></div>
    <button class="mdc" onclick="closeMd()">✕</button>
  </div>
  <div class="mdb" style="padding:0">
    <!-- Stats bar -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bd)">
      <div style="padding:12px;text-align:center;border-right:1px solid var(--bd)">
        <div style="font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace">${dms}</div>
        <div style="font-size:10px;color:#64748b">DMS Stock</div>
      </div>
      <div style="padding:12px;text-align:center;border-right:1px solid var(--bd)">
        <div style="font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#c8922a">₹${dlc.toFixed(2)}</div>
        <div style="font-size:10px;color:#64748b">DLC Rate</div>
      </div>
      <div style="padding:12px;text-align:center">
        <div style="font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#2563eb">${dates.length}</div>
        <div style="font-size:10px;color:#64748b">Audit Days</div>
      </div>
    </div>
    <!-- History by date -->
    <div style="max-height:420px;overflow-y:auto;padding:14px 18px">
      ${dates.length?dates.map(date=>{
        const entries=byDate[date];
        const vals=entries.map(e=>parseInt(e.qty)||0);
        const mode=vals.reduce((a,b)=>vals.filter(v=>v===b).length>vals.filter(v=>v===a).length?b:a,vals[0]);
        const diff=mode-dms;
        const dc=diff===0?'#059669':diff<0?'#dc2626':'#d97706';
        return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f1f5f9">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
            <div style="font-size:12px;font-weight:800;color:#0f172a">${fmtD(date)}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:${dc}">${mode}</span>
              <span style="font-size:10px;font-weight:700;color:${dc};background:${dc}15;padding:1px 8px;border-radius:20px">${diff===0?'✅ Match':diff<0?`🔻 Short ${Math.abs(diff)}`:`🔺 Excess +${diff}`}</span>
            </div>
          </div>
          ${entries.map(e=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:#f8fafc;border-radius:6px;margin-bottom:4px;font-size:11px">
            <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0">${(e.auditorName||e.auditor||'?')[0].toUpperCase()}</div>
            <span style="font-weight:700;flex:1">${esc(e.auditorName||e.auditor||'—')}</span>
            <span style="font-family:'JetBrains Mono',monospace;font-weight:800">${e.qty}</span>
            <span style="color:#94a3b8">${(e.time||'').slice(0,5)}</span>
          </div>`).join('')}
        </div>`;
      }).join(''):`<div style="text-align:center;padding:40px;color:#94a3b8">No audit history for this part yet</div>`}
    </div>
  </div>
  <div class="mdf"><button class="btn bgh" onclick="closeMd()">Close</button></div></div>`);
}

window.qcFill=function(pn,desc,bin){
  const i=$('QC_PN');if(i)i.value=pn;
  const al=$('QC_AL');if(al)al.style.display='none';
  const b=$('QC_BIN');if(b&&bin)b.value=bin;
  const info=$('QC_INFO');
  const item=findItem(pn);
  if(info&&item){
    info.style.display='block';
    info.innerHTML=`<strong>${esc(item.desc||pn)}</strong> · DMS: <strong>${item.systemQty||0}</strong> · MRP: ₹${item.mrp||0}`;
  }
};

function qcAdj(d){const e=$('QC_QTY');if(e)e.value=Math.max(0,(parseInt(e.value)||0)+d);}

async function qcSave(){
  const pn=($('QC_PN')?.value||'').trim().toUpperCase();
  const qty=parseInt($('QC_QTY')?.value)||0;
  const bin=$('QC_BIN')?.value||'';
  if(!pn){toast('Enter part number','w');return;}
  const item=findItem(pn);
  const dms=parseFloat(item?.systemQty||0);
  const variance=qty-dms;
  let reason='';
  if(variance!==0){
    reason=await promptReason(pn,variance,variance<0?'SHORT':'EXCESS');
    if(reason===null){toast('Reason required for variance','w');return;}
  }
  const r=await api({action:'saveCount',count:{
    id:uid(),partNo:pn,desc:item?.desc||'',bin:bin||item?.bin||'',
    date:today(),qty,time:nowt(),type:'MANUAL',remarks:reason||'Quick Count',
    auditor:S.user.username,auditorName:S.user.name,
    sessionId:S.auditS?.sessionId||'SESS001',dmsRefDate:today()
  }});
  if(r.success||r.queued){
    toast(`✅ ${pn} — Qty ${qty} saved`,'s');
    logTrail('COUNT_SAVED',pn,item?.desc||'',dms,qty,'Quick Count');
    closeMd();
  } else toast(r.error||'Failed','d');
}

// FEATURE 5 — SHIFT SUMMARY (end-of-shift report for executive)

async function rShiftSummary(){
  const pg=$('PG');
  pg.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8">⏳ Generating your shift summary…</div>';
  const myCounts=await fetchCounts(today(),S.user.username);
  const allCounts=await fetchCounts(today());

  // My stats
  const myDone=new Set(myCounts.map(c=>c.partNo)).size;
  const myShort=myCounts.filter(c=>{const i=findItem(c.partNo);return i&&(parseInt(c.qty)||0)<(parseFloat(i.systemQty)||0);}).length;
  const myExcess=myCounts.filter(c=>{const i=findItem(c.partNo);return i&&(parseInt(c.qty)||0)>(parseFloat(i.systemQty)||0);}).length;
  const myMatch=myDone-myShort-myExcess;
  const myAcc=myDone?Math.round(myMatch/myDone*100):100;
  const myBins=[...new Set(myCounts.map(c=>c.bin).filter(Boolean))];
  const myVal=myCounts.reduce((s,c)=>{const i=findItem(c.partNo);return s+(parseFloat(i?.dlc||0))*(parseInt(c.qty)||0);},0);
  const dt=getDT();
  const myTarget=dt[S.user.username]?.target||0;
  const targetPct=myTarget>0?Math.min(100,Math.round(myDone/myTarget*100)):null;

  // Time range
  const sortedTimes=myCounts.map(c=>c.time||'').filter(Boolean).sort();
  const firstScan=sortedTimes[0]?.slice(0,5)||'—';
  const lastScan=sortedTimes[sortedTimes.length-1]?.slice(0,5)||'—';

  pg.innerHTML=`
  <div class="ph"><div><div class="pt">📋 My Shift Summary</div><div class="ps">${fmtD(new Date())} · ${esc(S.user.name||S.user.username)}</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh bsm" onclick="window.print()">🖨 Print</button>
      <button class="btn bgh bsm" onclick="shiftExport()">⬇ Export</button>
    </div>
  </div>

  <!-- Hero card -->
  <div style="background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:18px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(37,99,235,.15)"></div>
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px">Today's Achievements</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:14px;margin-bottom:16px">
      ${[
        {v:myDone,l:'Parts Counted',c:'#60a5fa'},
        {v:myAcc+'%',l:'Accuracy',c:myAcc>=90?'#4ade80':myAcc>=70?'#fbbf24':'#f87171'},
        {v:myBins.length,l:'Bins Covered',c:'#c4b5fd'},
        {v:myCounts.length,l:'Total Entries',c:'#fde68a'}
      ].map(s=>`<div style="text-align:center">
        <div style="font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${s.c}">${s.v}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;text-transform:uppercase;letter-spacing:.4px">${s.l}</div>
      </div>`).join('')}
    </div>
    ${targetPct!==null?`<div style="margin-top:6px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:rgba(255,255,255,.5)">
        <span>Daily Target Progress</span><span>${myDone}/${myTarget} (${targetPct}%)</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,.1);border-radius:6px;overflow:hidden">
        <div style="width:${targetPct}%;height:100%;background:${targetPct>=100?'#4ade80':targetPct>=70?'#60a5fa':'#fbbf24'};border-radius:6px;transition:width 1s"></div>
      </div>
    </div>`:''}
    <div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.4)">
      First scan: <strong style="color:rgba(255,255,255,.7)">${firstScan}</strong> · Last scan: <strong style="color:rgba(255,255,255,.7)">${lastScan}</strong>
    </div>
  </div>

  <!-- Variance breakdown -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">
    <div style="background:#ecfdf5;border:1.5px solid #a7f3d0;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#059669">${myMatch}</div>
      <div style="font-size:10px;font-weight:700;color:#059669;margin-top:3px">✅ Matched</div>
    </div>
    <div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#dc2626">${myShort}</div>
      <div style="font-size:10px;font-weight:700;color:#dc2626;margin-top:3px">🔻 Short Found</div>
    </div>
    <div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#d97706">${myExcess}</div>
      <div style="font-size:10px;font-weight:700;color:#d97706;margin-top:3px">🔺 Excess Found</div>

  <!-- Full scan log -->
  <div class="cd">
    <div class="cdh"><div class="cdt">📋 My Scan Log Today (${myCounts.length} entries)</div></div>
    <div class="tw" style="max-height:400px;overflow-y:auto"><table>
      <thead><tr><th>Time</th><th>Part No</th><th>Description</th><th>Qty</th><th>Bin</th><th>Status</th></tr></thead>
      <tbody>${myCounts.length?[...myCounts].sort((a,b)=>b.time?.localeCompare(a.time||'')||0).slice(0,100).map(c=>{
        const i=findItem(c.partNo);const dms=parseFloat(i?.systemQty||0);const diff=(parseInt(c.qty)||0)-dms;
        const sc=diff===0?'#059669':diff<0?'#dc2626':'#d97706';
        const sl=diff===0?'✅ Match':diff<0?`🔻 ${diff}`:`🔺 +${diff}`;
        return`<tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:10px">${(c.time||'').slice(0,5)}</td>

          <td class="tq">${c.qty}</td>
          <td>${c.bin?`<span class="bg bgp" style="font-size:9px">${esc(c.bin)}</span>`:'—'}</td>
          <td style="font-size:11px;font-weight:700;color:${sc}">${sl}</td>
        </tr>`;
      }).join(''):`<tr><td colspan="6" style="text-align:center;padding:24px;color:#94a3b8">No scans today</td></tr>`}
      </tbody>
    </table></div>
  </div>`;

  window._shiftData={myCounts,myDone,myMatch,myShort,myExcess,myBins,myAcc};
}

function shiftExport(){
  const d=window._shiftData;if(!d)return;
  const csv='Time,Part No,Description,Qty,Bin\n'
    +d.myCounts.map(c=>`"${(c.time||'').slice(0,5)}","${c.partNo}","${(c.desc||'').replace(/"/g,'""')}",${c.qty},"${c.bin||''}"`).join('\n');
  dlCSV(csv,`shift_summary_${S.user.username}_${today()}.csv`);
  toast('Shift summary exported','s');
}

// Hook logTrail into key existing functions (patch at boot)
const _origSaveCount=window.saveCount;
// We patch svItem and subMan to log changes
const _origSvItem=window.svItem;
const _origUpdItem=window.updItem;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  ['LU','LPW'].forEach(id=>{const el=$(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});});
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openGS();}if(e.key==='Escape')closeGS();});
  document.addEventListener('click',e=>{document.querySelectorAll('.acl').forEach(l=>{if(!l.closest('.acw')?.contains(e.target))l.style.display='none';});if(!$('GSO').contains(e.target)&&e.target!==$('GSO')){}});
  window.addEventListener('online',()=>{S.online=true;syncUI();flushQ();_oqFlush();});
  window.addEventListener('offline',()=>{S.online=false;syncUI();});

  // Patch subMan to log trail
  const _origSubMan=window.subMan;
  window.subMan=async function(sfx){
    const pn=($(`MP${sfx}`)?.value||'').trim().toUpperCase();
    const qty=parseInt($(`MPQ${sfx}`)?.value)||0;
    const desc=$(`MD${sfx}`)?.value||'';
    const oldQty=(S.counts||[]).filter(c=>c.partNo===pn&&c.date===today()).reduce((s,c)=>s+(parseFloat(c.qty)||0),0);
    await _origSubMan.call(this,sfx);
    if(pn) logTrail('COUNT_SAVED',pn,desc,oldQty||'—',qty,'Manual entry');
  };

  // Patch svItem to log trail
  const _origSvItemFn=window.svItem;
  if(_origSvItemFn) window.svItem=async function(){
    const pn=($('NIP')?.value||'').trim().toUpperCase();
    await _origSvItemFn.call(this);
    if(pn) logTrail('ITEM_ADDED',pn,$('NID')?.value||'','—','New item','Added via Item Master');
  };

  // Patch updItem to log trail
  const _origUpdItemFn=window.updItem;
  if(_origUpdItemFn) window.updItem=async function(){
    const pn=$('EIP')?.value;
    const item=S.items.find(i=>i.partNo===pn);
    const oldQty=item?.systemQty;
    await _origUpdItemFn.call(this);
    if(pn) logTrail('ITEM_EDITED',pn,item?.desc||'',`Qty:${oldQty}`,`Qty:${$('EIQ')?.value||''}`,`Bin:${$('EIB')?.value||''}`);
  };

  // Patch delRow to log trail
  const _origDelRow=window.delRow;
  window.delRow=async function(id,rowId){
    const row=$(rowId);
    const cells=row?row.querySelectorAll('td'):[];
    const pn=cells[1]?.textContent||'';
    const qty=cells[4]?.textContent||'';
    await _origDelRow.call(this,id,rowId);
    if(pn) logTrail('COUNT_DELETED',pn,'',qty,'0','Deleted from log');
  };

  // ── BACK BUTTON SUPPORT ──────────────────────────────
  // When user presses back, navigate to previous page inside app
  window.addEventListener('popstate',(e)=>{
    if(!S.user)return; // not logged in — let browser handle
    if(e.state&&e.state.page){
      // Navigate to previous page WITHOUT pushing new history entry
      go(e.state.page, true);
    } else {
      // No state — go to dashboard
      go('dashboard', true);
    }
  });

  // Handle hash on load (e.g. if user bookmarked a page)
  window.addEventListener('hashchange',()=>{
    if(!S.user)return;
    const hash=location.hash.replace('#','');
    const validPages=['dashboard','scan','manual','bins','scanlog','variance','daywise','fullsummary','uncounted','foc','movingparts','billtype','orderplan','qrgen','binqr','audittrail','invanalysis','itemmaster','dms','settings'];
    if(validPages.includes(hash))go(hash,true);
  });

  const s=loadSess();if(s){S.user=s;bootApp();}
});
