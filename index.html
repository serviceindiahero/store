<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#161616">
<title>India Motors | Enterprise Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
/* ══════════════════════════════════════════════════════════
   DESIGN SYSTEM (FLUID & MODERN)
══════════════════════════════════════════════════════════ */
:root{
  --bg:#f4f4f4; --surface:#ffffff; --border:#e0e0e0;
  --blue:#0f62fe; --blue-d:#0043ce; --blue-l:#edf5ff;
  --green:#198038; --green-l:#defbe6;
  --red:#da1e28; --red-l:#fff1f1;
  --amber:#f1c21b; --amber-l:#fcf1cd;
  --t1:#161616; --t2:#525252; --t3:#8d8d8d;
  --sb:#161616; --sb-hover:#393939; --sb-active:#0f62fe;
  --r:4px; --rs:2px;
  --shadow:0 2px 6px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;height:100vh;overflow:hidden;}

/* Reusable Components */
.btn { display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:8px 16px;border-radius:var(--rs);font-weight:500;cursor:pointer;border:1px solid transparent;transition:.15s;text-decoration:none;}
.btn-primary { background:var(--blue);color:#fff; }
.btn-ghost { background:transparent; border-color:var(--border); color:var(--t1); }
.input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--rs); outline:none; transition:.2s; }
.input:focus { border-color:var(--blue); box-shadow:0 0 0 2px var(--blue-l); }

/* Layout */
#LOGIN { position:fixed; inset:0; background:var(--bg); z-index:1000; display:flex; align-items:center; justify-content:center; }
#APP { display:none; height:100vh; flex-direction:column; }
.topbar { height:56px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:16px; }
.lay { flex:1; display:flex; overflow:hidden; }
.sidebar { width:240px; background:var(--sb); color:#fff; display:flex; flex-direction:column; transition:.3s; }
.main { flex:1; overflow-y:auto; padding:24px; position:relative; }

/* Dashboard Grids */
.stat-grid { display:grid; gap:16px; margin-bottom:24px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
.stat { background:#fff; border:1px solid var(--border); padding:16px; border-top:3px solid var(--blue); border-radius:var(--r); }
.stat-val { font-size:24px; font-weight:700; font-family:'JetBrains Mono'; }

/* Scanner UI */
#reader { width:100%; max-width:500px; margin:0 auto; border-radius:12px; overflow:hidden; border:2px solid var(--blue); }

/* AI Widget */
.ai-fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg, #0f62fe, #8a3ffc); color:#fff; border:none; cursor:pointer; font-size:24px; box-shadow:var(--shadow); z-index:900; }
.chat-panel { position:fixed; bottom:90px; right:24px; width:340px; height:450px; background:#fff; border:1px solid var(--border); border-radius:var(--r); box-shadow:0 8px 24px rgba(0,0,0,0.15); display:none; flex-direction:column; z-index:900; }
.chat-panel.on { display:flex; }

/* Responsive */
@media(max-width: 768px) {
  .sidebar { position:fixed; left:-240px; top:56px; bottom:0; z-index:500; }
  .sidebar.on { left:0; }
}
</style>
</head>
<body>

<div id="LOGIN">
  <div style="width:320px; background:#fff; padding:32px; border-radius:8px; box-shadow:var(--shadow);">
    <h2 style="margin-bottom:24px; text-align:center;">India Motors</h2>
    <input type="text" id="L_U" class="input" placeholder="Username" style="margin-bottom:12px;">
    <input type="password" id="L_P" class="input" placeholder="Password" style="margin-bottom:20px;">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login to Audit</button>
  </div>
</div>

<div id="APP">
  <div class="topbar">
    <button onclick="document.getElementById('SB').classList.toggle('on')" class="btn btn-ghost" style="padding:4px 8px;">☰</button>
    <div style="font-weight:700; font-size:16px;">Inventory 2.0</div>
    <div style="margin-left:auto; display:flex; gap:12px; align-items:center;">
      <input type="text" id="G_SEARCH" placeholder="Quick Search (Ctrl+K)" class="input" style="width:200px; height:32px; font-size:12px;" oninput="globalSearch(this.value)">
      <span id="U_NAME" style="font-weight:600; color:var(--blue);"></span>
    </div>
  </div>

  <div class="lay">
    <div class="sidebar" id="SB">
      <div style="padding:20px; font-size:11px; color:var(--t3); text-transform:uppercase; letter-spacing:1px;">Menu</div>
      <div onclick="go('dash')" class="btn btn-ghost" style="color:#fff; width:100%; justify-content:flex-start; border:none;">📊 Dashboard</div>
      <div onclick="go('scan')" class="btn btn-ghost" style="color:#fff; width:100%; justify-content:flex-start; border:none;">📷 Scanner</div>
      <div onclick="go('items')" class="btn btn-ghost" style="color:#fff; width:100%; justify-content:flex-start; border:none;">📦 Item List</div>
      <div onclick="go('variance')" class="btn btn-ghost" style="color:#fff; width:100%; justify-content:flex-start; border:none;">📉 Variance</div>
      <div style="margin-top:auto; padding:16px;">
        <button onclick="logout()" class="btn btn-ghost" style="color:var(--red); width:100%; border-color:var(--red);">Logout</button>
      </div>
    </div>

    <main class="main" id="PG"></main>
  </div>
</div>

<button class="ai-fab" onclick="document.getElementById('CHAT').classList.toggle('on')">✨</button>
<div class="chat-panel" id="CHAT">
  <div style="padding:12px; background:var(--t1); color:#fff; display:flex; justify-content:space-between;">
    <span>AI Assistant</span>
    <button onclick="document.getElementById('CHAT').classList.remove('on')" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>
  </div>
  <div id="CHAT_B" style="flex:1; overflow-y:auto; padding:12px; background:#f9f9f9; display:flex; flex-direction:column; gap:8px;"></div>
  <div style="padding:8px; border-top:1px solid var(--border); display:flex; gap:4px;">
    <input type="text" id="CHAT_I" class="input" placeholder="Ask AI..." onkeypress="if(event.key==='Enter')askAI()">
    <button onclick="askAI()" class="btn btn-primary" style="padding:4px 12px;">Send</button>
  </div>
</div>

<script>
// ==========================================
// CONFIG & STATE
// ==========================================
const API = 'https://script.google.com/macros/s/AKfycbyzkrEZgAq9WdwPWtpu6lqdFsnL48dmRfEeeYAACtgRIM7Ma3-TTWtrzaM0IItLAnTGpw/exec'; 
let S = { user: null, items: [], bins: [], counts: [], currentSession: 'S001' };
const $ = id => document.getElementById(id);

// ==========================================
// CORE LOGIC (Login, Fetch, Routing)
// ==========================================
async function api(data) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
  return res.json();
}

async function doLogin() {
  const u = $('L_U').value, p = $('L_P').value;
  const res = await api({ action: 'login', username: u, password: p });
  if(res.success) {
    S.user = res.user;
    $('LOGIN').style.display = 'none';
    $('APP').style.display = 'flex';
    $('U_NAME').innerText = S.user.name;
    await syncData();
    go('dash');
  } else alert('Bhai, invalid credentials!');
}

async function syncData() {
  const [items, bins, counts] = await Promise.all([
    api({action:'getItems'}), api({action:'getBins'}), api({action:'getCounts'})
  ]);
  S.items = items.items; S.bins = bins.bins; S.counts = counts.counts;
}

function go(page) {
  const pg = $('PG');
  if(page === 'dash') renderDash(pg);
  if(page === 'scan') renderScan(pg);
  if(page === 'items') renderItems(pg);
  if(page === 'variance') renderVariance(pg);
}

// ==========================================
// SCANNER LOGIC (Fixed & Full)
// ==========================================
function renderScan(pg) {
  pg.innerHTML = `
    <div class="card" style="max-width:500px; margin:0 auto;">
      <div id="reader"></div>
      <div style="margin-top:20px;">
        <input type="text" id="MANUAL_P" class="input" placeholder="Enter Part Number" onkeypress="if(event.key==='Enter')loadItem(this.value)">
        <div id="SCAN_RES" style="margin-top:20px;"></div>
      </div>
    </div>`;
  
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
  scanner.render((code) => { 
    scanner.clear();
    loadItem(code); 
  });
}

function loadItem(pn) {
  const item = S.items.find(i => i.partNo === pn);
  const res = $('SCAN_RES');
  if(!item) { res.innerHTML = `<div style="color:red">Part No not found!</div>`; return; }
  
  res.innerHTML = `
    <div style="background:var(--blue-l); padding:16px; border-radius:4px;">
      <h3>${item.desc}</h3>
      <p>System Qty: <b>${item.systemQty}</b></p>
      <input type="number" id="COUNT_Q" class="input" placeholder="Physical Qty" style="margin:10px 0;">
      <button onclick="saveCount('${item.partNo}')" class="btn btn-primary" style="width:100%">Save Count</button>
    </div>`;
}

async function saveCount(pn) {
  const qty = $('COUNT_Q').value;
  if(!qty) return alert('Enter Qty');
  const res = await api({ action: 'saveCount', count: {
    id: Date.now(), partNo: pn, qty: qty, auditor: S.user.username, date: new Date().toISOString()
  }});
  if(res.success) { alert('Saved!'); syncData(); go('scan'); }
}

// ==========================================
// ANALYTICS & DASHBOARD
// ==========================================
function renderDash(pg) {
  const totalVal = S.items.reduce((a, b) => a + (parseFloat(b.systemQty)*parseFloat(b.dlc||0)), 0);
  pg.innerHTML = `
    <h1>Dashboard</h1>
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Total SKUs</div><div class="stat-val">${S.items.length}</div></div>
      <div class="stat"><div class="stat-label">Inventory Value</div><div class="stat-val">₹${Math.round(totalVal/100000)}L</div></div>
      <div class="stat"><div class="stat-label">Audited Today</div><div class="stat-val">${S.counts.length}</div></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
       <div class="stat"><canvas id="chart1"></canvas></div>
       <div class="stat"><canvas id="chart2"></canvas></div>
    </div>`;
  // Chart initialization logic here...
}

// ==========================================
// AI CHATBOT LOGIC
// ==========================================
async function askAI() {
  const i = $('CHAT_I'), b = $('CHAT_B');
  const txt = i.value; if(!txt) return;
  b.innerHTML += `<div style="align-self:flex-end; background:var(--blue-l); padding:8px; border-radius:4px;">${txt}</div>`;
  i.value = '';
  
  const res = await api({ action: 'chat', message: txt, context: { totalItems: S.items.length, shortages: 12 } });
  b.innerHTML += `<div style="align-self:flex-start; background:#eee; padding:8px; border-radius:4px;">${res.reply}</div>`;
  b.scrollTop = b.scrollHeight;
}

function logout() { location.reload(); }
</script>
</body>
</html>
