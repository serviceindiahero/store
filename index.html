  const prBg={critical:'#fff1f2',high:'#fffbeb',medium:'#f0fdf4'};

  const tblBody=plan.map((x,i)=>{
    const diff=hasPortal&&x.portalQty?x.portalQty-x.qty:null;
    const sdCls=x.stockDays<7?'color:#dc2626;font-weight:800':x.stockDays<21?'color:#d97706;font-weight:700':'color:#059669';
    return`<tr style="background:${prBg[x.priority]||''}">
      <td style="color:#94a3b8;font-size:11px">${i+1}</td>
      <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#2563eb">${esc(x.partNo)}</span></td>
      <td style="font-size:11px;max-width:160px">${esc(tr2(x.desc,25))}</td>
      <td style="font-size:10px"><span class="bg bgp" style="font-size:9px">${esc(x.bin||'—')}</span></td>
      <td style="text-align:right;font-weight:700;font-family:'JetBrains Mono',monospace">${fmt(x.currentStock)}</td>
      <td style="text-align:right;font-size:11px;${sdCls}">${x.stockDays>=999?'∞':x.stockDays+'d'}</td>
      <td style="text-align:right;font-size:11px">${x.avgMonthly.toFixed(1)}</td>
      <td style="text-align:right">
        ${x.reduced?
          `<span style="display:inline-block;background:#fffbeb;border:1.5px solid #fde68a;color:#d97706;border-radius:6px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px" title="Reduced due to budget cap">${x.qty}⚡</span>`:
          `<span style="display:inline-block;background:#eff6ff;border:1.5px solid #bfdbfe;color:#2563eb;border-radius:6px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px">${x.qty}</span>`}
      </td>
      ${hasPortal?`
      <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700">${x.portalQty||'—'}</td>
      <td style="text-align:right;font-weight:700;color:${diff===null?'#94a3b8':diff>0?'#059669':diff<0?'#dc2626':'#94a3b8'}">${diff!==null&&x.portalQty?(diff>0?'+':'')+diff:'—'}</td>`:''}
      <td style="text-align:right;font-size:11px">₹${fmt(x.dlc)}</td>
      <td style="text-align:right;font-size:11px;font-weight:700">₹${fmt(Math.round(x.totalCost))}</td>
      <td><span style="${prCls[x.priority]}">${prLbl[x.priority]}</span></td>
    </tr>`;
  }).join('');

  res.innerHTML=`
  <!-- KPI Cards -->
  <div class="sg s4" style="margin-bottom:16px">
    <div class="st" style="border-left:4px solid #dc2626">
      <div class="stl">🚨 Critical</div>
      <div class="stv" style="color:#dc2626">${crit}</div>
      <div class="sts">Zero stock + has sales</div>
    </div>
    <div class="st" style="border-left:4px solid #d97706">
      <div class="stl">⚠️ High Priority</div>
      <div class="stv" style="color:#d97706">${high}</div>
      <div class="sts">Below reorder point</div>
    </div>
    <div class="st" style="border-left:4px solid #059669">
      <div class="stl">✅ Medium</div>
      <div class="stv" style="color:#059669">${med}</div>
      <div class="sts">Replenishment needed</div>
    </div>
    <div class="st" style="border-left:4px solid #2563eb">
      <div class="stl">💰 Order Value</div>
      <div class="stv" style="color:#2563eb;font-size:18px">₹${(budgetUsed/100000).toFixed(2)}L</div>
      <div class="sts">of ₹${(budgetCap/100000).toFixed(2)}L cap</div>
    </div>
  </div>

  <!-- Budget Bar -->
  <div class="cd" style="margin-bottom:16px">
    <div class="cdb" style="padding:14px 18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:700">
        <span>💰 Budget Used: <span style="color:${budgetColor}">₹${fmt(Math.round(budgetUsed))}</span></span>
        <span style="color:#64748b">Cap: ₹${fmt(budgetCap)} &nbsp;|&nbsp; Remaining: ₹${fmt(Math.round(budgetCap-budgetUsed))}</span>
      </div>
      <div style="height:12px;background:#f1f5f9;border-radius:12px;overflow:hidden">
        <div style="height:100%;width:${budgetPct.toFixed(1)}%;background:${budgetColor};border-radius:12px;transition:width .6s;position:relative">
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#94a3b8">
        <span>₹0</span><span>₹${(budgetCap/2/100000).toFixed(2)}L</span><span>₹${(budgetCap/100000).toFixed(2)}L</span>
      </div>
      <div style="margin-top:10px;padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;color:#1e40af">
        📌 <strong>Rule Applied:</strong> Parts with zero sales in last 6 months are excluded — order is based purely on consumption history.
        ${skipped.length?`<br>⚡ ${skipped.length} parts skipped due to budget limit — plan for next month's order.`:''}
      </div>
    </div>
  </div>

  <!-- Main Order Table -->
  <div class="cd" style="margin-bottom:14px">
    <div class="cdh">
      <div class="cdt">📋 Order Plan — ${plan.length} Parts</div>
      <div style="display:flex;gap:8px">
        <button class="btn bgh bsm" onclick="opDlPlan()">⬇️ Export CSV</button>
        <button class="btn bpr bsm" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
    <div style="padding:8px 16px;background:#f8fafc;border-bottom:1px solid var(--bd);font-size:11px;color:#64748b">
      Parameters: Cover ${_opParams.coverWeeks}W + Safety ${_opParams.safetyWeeks}W · Lead ${_opParams.leadDays}d · Budget ₹${(_opParams.budgetCap/100000).toFixed(2)}L
      ${hasPortal?` · <span style="color:#059669;font-weight:700">Portal order loaded (${ORDER_PORTAL.length} lines)</span>`:''}
    </div>
    <div class="tw"><table>
      <thead><tr>
        <th>#</th><th>Part No</th><th>Description</th><th>Bin</th>
        <th style="text-align:right">Stock</th>
        <th style="text-align:right">Cover</th>
        <th style="text-align:right">Avg/Mo</th>
        <th style="text-align:right">Order Qty</th>
        ${hasPortal?'<th style="text-align:right">Portal</th><th style="text-align:right">Diff</th>':''}
        <th style="text-align:right">DLC ₹</th>
        <th style="text-align:right">Est. Cost</th>
        <th>Priority</th>
      </tr></thead>
      <tbody>${tblBody}</tbody>
      <tfoot><tr style="background:#f0f4f8;font-weight:800">
        <td colspan="${hasPortal?10:8}" style="text-align:right;padding:12px 14px;font-size:13px">Total Order Value:</td>
        <td style="text-align:right;font-family:'JetBrains Mono',monospace;color:#2563eb;font-size:15px">₹${fmt(Math.round(budgetUsed))}</td>
        <td></td>
      </tr></tfoot>
    </table></div>
  </div>

  <!-- Skipped Table -->
  ${skipped.length?`
  <div class="cd">
    <div class="cdh">
      <div class="cdt" style="color:#dc2626">⏭ Budget Limit — ${skipped.length} Parts Deferred</div>
      <button class="btn bda bsm" onclick="opDlSkipped()">⬇️ Export Deferred</button>
    </div>
    <div style="padding:8px 16px;background:#fef2f2;border-bottom:1px solid #fecaca;font-size:12px;color:#dc2626;font-weight:600">
      These parts need ordering but budget of ₹${(budgetCap/100000).toFixed(2)}L is exhausted. Plan for next month.
      Total deferred value: ₹${fmt(Math.round(skipped.reduce((s,x)=>s+x.totalCost,0)))}
    </div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>Part No</th><th>Description</th><th style="text-align:right">Stock</th><th style="text-align:right">Avg/Mo</th><th style="text-align:right">Need Qty</th><th style="text-align:right">Est. Cost</th><th>Priority</th></tr></thead>
      <tbody>${skipped.map((x,i)=>`<tr>
        <td style="color:#94a3b8;font-size:11px">${i+1}</td>
        <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#dc2626">${esc(x.partNo)}</span></td>
        <td style="font-size:11px">${esc(tr2(x.desc,26))}</td>
        <td style="text-align:right;font-weight:700">${fmt(x.currentStock)}</td>
        <td style="text-align:right;font-size:11px">${x.avgMonthly.toFixed(1)}</td>
        <td style="text-align:right"><span style="display:inline-block;background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626;border-radius:6px;padding:2px 8px;font-weight:800;font-family:'JetBrains Mono',monospace">${x.qty}</span></td>
        <td style="text-align:right;font-size:11px;font-weight:700">₹${fmt(Math.round(x.totalCost))}</td>
        <td><span style="${prCls[x.priority]}">${prLbl[x.priority]}</span></td>
      </tr>`).join('')}
      <tfoot><tr style="background:#fef2f2;font-weight:800">
        <td colspan="6" style="text-align:right;padding:10px 14px">Deferred Total:</td>
        <td style="text-align:right;color:#dc2626">₹${fmt(Math.round(skipped.reduce((s,x)=>s+x.totalCost,0)))}</td><td></td>
      </tr></tfoot>
      </tbody>
    </table></div>
  </div>`:''} `;
}

function opDlPlan(){
  if(!_opPlan) return;
  const p=_opParams||{};
  const csv=`India Motors — Smart Order Plan\nGenerated: ${today()} | Cover: ${p.coverWeeks}W | Safety: ${p.safetyWeeks}W | Lead: ${p.leadDays}d | Budget: ₹${p.budgetCap}\n`
    +`Part No,Description,Category,Bin,Current Stock,Stock Cover(days),Avg/Month(6M),Order Qty,${p.hasPortal?'Portal Qty,Diff,':''}DLC Rate,Est Cost,Priority\n`
    +_opPlan.map(x=>`"${x.partNo}","${(x.desc||'').replace(/"/g,'""')}","${x.cat||''}","${x.bin||''}",${x.currentStock},${x.stockDays>=999?999:x.stockDays},${x.avgMonthly.toFixed(2)},${x.qty},${p.hasPortal?(x.portalQty||0)+','+(x.portalQty-x.qty)+',':''}${x.dlc},${Math.round(x.totalCost)},"${x.priority}"`).join('\n');
  dlCSV(csv,`order_plan_${today()}.csv`);
  toast(`${_opPlan.length} parts exported`,'s');
}

function opDlSkipped(){
  if(!_opSkipped||!_opSkipped.length) return;
  const csv=`Part No,Description,Category,Current Stock,Avg/Month,Need Qty,Est Cost,Priority\n`
    +_opSkipped.map(x=>`"${x.partNo}","${(x.desc||'').replace(/"/g,'""')}","${x.cat||''}",${x.currentStock},${x.avgMonthly.toFixed(2)},${x.qty},${Math.round(x.totalCost)},"${x.priority}"`).join('\n');
  dlCSV(csv,`deferred_order_${today()}.csv`);
  toast(`${_opSkipped.length} deferred parts exported`,'s');
}

document.addEventListener('DOMContentLoaded',()=>{
  ['LU','LPW'].forEach(id=>{const el=$(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});});
  document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openGS();}if(e.key==='Escape')closeGS();});
  document.addEventListener('click',e=>{document.querySelectorAll('.acl').forEach(l=>{if(!l.closest('.acw')?.contains(e.target))l.style.display='none';});if(!$('GSO').contains(e.target)&&e.target!==$('GSO')){}});
  window.addEventListener('online',()=>{S.online=true;syncUI();flushQ();});
  window.addEventListener('offline',()=>{S.online=false;syncUI();});

  // ── BACK BUTTON SUPPORT ──────────────────────────────
  // When user presses back, navigate to previous page inside app
  window.addEventListener('popstate',(e)=>{
    if(!S.user)return; // not logged in — let browser handle
    if(e.state&&e.state.page){
      // Navigate to previous page WITHOUT pushing new history entry
      go(e.state.page, true);
    } else {
      // No state — go to dashboard
      go('dashboard', true);
    }
  });

  // Handle hash on load (e.g. if user bookmarked a page)
  window.addEventListener('hashchange',()=>{
    if(!S.user)return;
    const hash=location.hash.replace('#','');
    const validPages=['dashboard','scan','manual','bins','scanlog','variance','daywise','fullsummary','uncounted','foc','movingparts','orderplan','qrgen','itemmaster','dms','settings'];
    if(validPages.includes(hash))go(hash,true);
  });

  const s=loadSess();if(s){S.user=s;bootApp();}
});
