// ★ UPGRADED: Variance page — uses mode (most frequent value) as final count
//   Shows multi-user entries per part, lock button for master auditor
async function rVariance(){
  const pg=$('PG');pg.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8">⏳ Loading…</div>';
  const counts=await fetchCounts();
  const bo=S.bins.map(b=>`<option value="${esc(b.bin)}">${esc(b.bin)}</option>`).join('');

  // ★ Build per-part map using MODE (most frequent count) as final qty
  // Each part: collect all user entries → one entry per user (latest) → mode
  const today_s=today();
  const partUserMap={}; // partNo → {username → latest count entry}
  counts.forEach(c=>{
    if(!partUserMap[c.partNo])partUserMap[c.partNo]={};
    const existing=partUserMap[c.partNo][c.auditor];
    if(!existing||c.time>existing.time) partUserMap[c.partNo][c.auditor]=c;
  });
  // cMap[partNo] = mode of all user counts
  const cMap={};
  const cUserMap={}; // partNo → {mode, userEntries[], allValues[]}
  Object.entries(partUserMap).forEach(([pn,byUser])=>{
    const entries=Object.values(byUser);
    const vals=entries.map(e=>parseInt(e.qty)||0);
    const freq={};vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
    let mode=vals[0],maxF=0;
    Object.entries(freq).forEach(([v,f])=>{if(parseInt(f)>maxF){maxF=parseInt(f);mode=parseInt(v);}});
    cMap[pn]=mode;
    cUserMap[pn]={mode,entries,allValues:vals,userCount:entries.length};
  });

  const lockedParts=getLockedParts();
  const isMaster=S.user?.role==='master_auditor';

  pg.innerHTML=`<div class="ph"><div><div class="pt">📊 Variance Report</div>
    <div class="ps">Final count = mode (most frequent value across users) · DMS qty = System Qty</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn bgh bsm" onclick="expVar('all')">⬇ Export</button>
      <button class="btn bgh bsm" onclick="showEmail('variance')">📧 Email</button>
      <button class="btn bgh bsm" onclick="printReport('Variance Report')">🖨 Print</button>
      ${isMaster?`<button class="btn bwa bsm" onclick="rFinalCountPanel()">🔐 Resolve Final Counts</button>`:''}
    </div>
  </div>
  <div class="cd"><div class="fb">
    <input class="fin" id="VFS" placeholder="🔍 Search part / description" oninput="dVT()">
    <select class="fin" id="VFB" onchange="dVT()"><option value="">All Bins</option>${bo}</select>
    <select class="fin" id="VFST" onchange="dVT()"><option value="">All Status</option><option value="match">Match</option><option value="short">Short</option><option value="excess">Excess</option><option value="notcounted">Not Counted</option></select>
    <select class="fin" id="VFMULTI" onchange="dVT()"><option value="">All Counts</option><option value="multi">Multi-User Only</option><option value="conflict">Conflicting Values</option></select>
  </div>
  <div id="VTBL"></div><div id="VSUM" class="smb"></div><div id="VPAG" class="pag"></div></div>`;

  S.pd.vm=cMap;S.pd.vcum=cUserMap;S.pd.vlock=lockedParts;S.pg.v={p:1,sz:PGSZ};dVT();
}

// ★ UPGRADED: Variance table renderer — mode-based final count, multi-user flags
function dVT(){
  const w=$('VTBL'),sm=$('VSUM'),pag=$('VPAG');if(!w)return;
  const cm=S.pd.vm||{};
  const cum=S.pd.vcum||{};
  const lockedParts=S.pd.vlock||{};
  const isMaster=S.user?.role==='master_auditor';
  const s=($('VFS')?.value||'').toUpperCase(),b=$('VFB')?.value||'',st=$('VFST')?.value||'';
  const multiFilter=$('VFMULTI')?.value||'';
  const p=S.pg.v||{p:1,sz:PGSZ};
  let rows=S.items.map(item=>{
    const cu=cum[item.partNo]||null;
    const cnt=cm[item.partNo]??null;
    const dms=parseFloat(item.systemQty)||0;
    const diff=cnt!==null?cnt-dms:null;
    const st2=cnt===null?'notcounted':diff===0?'match':diff<0?'short':'excess';
    const isMulti=cu&&cu.userCount>1;
    const isConflict=cu&&cu.userCount>1&&(new Set(cu.allValues).size>1);
    return{item,cnt,dms,diff,st:st2,cu,isMulti,isConflict,locked:!!lockedParts[item.partNo]};
  });
  if(s)rows=rows.filter(r=>(r.item.partNo||'').toUpperCase().includes(s)||(r.item.desc||'').toUpperCase().includes(s));
  if(b)rows=rows.filter(r=>(r.item.bin||'')===b);
  if(st)rows=rows.filter(r=>r.st===st);
  if(multiFilter==='multi')rows=rows.filter(r=>r.isMulti);
  if(multiFilter==='conflict')rows=rows.filter(r=>r.isConflict);
  rows.sort((a,bb)=>{
    // Conflicts first, then short, excess, match, notcounted
    const rank=r=>r.isConflict?0:r.st==='short'?1:r.st==='excess'?2:r.st==='match'?3:4;
    return rank(a)-rank(bb);
  });
  const tots={match:0,short:0,excess:0,notcounted:0,conflict:0};
  rows.forEach(r=>{tots[r.st]++;if(r.isConflict)tots.conflict++;});
  const dlcTot={short:0,excess:0};
  rows.forEach(r=>{
    if((r.st==='short'||r.st==='excess')&&r.diff!==null)
      dlcTot[r.st]+=Math.abs(r.diff)*(parseFloat(r.item.dlc)||0);
  });
  if(sm)sm.innerHTML=
    '<div class="smi">Total: <strong>'+rows.length+'</strong></div>'
    +'<div class="smi" style="color:#059669">✅ '+tots.match+'</div>'
    +'<div class="smi" style="color:#dc2626">🔻 '+tots.short+'</div>'
    +'<div class="smi" style="color:#d97706">🔺 '+tots.excess+'</div>'
    +'<div class="smi" style="color:#94a3b8">⬜ '+tots.notcounted+'</div>'
    +(tots.conflict?'<div class="smi" style="color:#7c3aed">⚡ '+tots.conflict+' conflicts</div>':'');
  const tot=rows.length,pages=Math.ceil(tot/p.sz),st2=(p.p-1)*p.sz;
  const sl={match:'Match',short:'Short',excess:'Excess',notcounted:'Not Counted'};
  let tbody='';
  rows.slice(st2,st2+p.sz).forEach(function(r,i){
    const sb=r.st==='match'?'bgs':r.st==='short'?'bgd':r.st==='excess'?'bgw':'bgg';
    const dc=r.st==='short'?'ds':r.st==='excess'?'de':r.st==='match'?'dm':'';
    const ds=r.diff!==null?(r.diff>0?'▲':r.diff<0?'▼':'±')+Math.abs(r.diff):'—';
    const dlc=parseFloat(r.item.dlc)||0;
    const showVal=(r.st==='short'||r.st==='excess')&&r.diff!==null;
    const val=showVal?('₹'+Math.round(Math.abs(r.diff)*dlc).toLocaleString('en-IN')):'—';
    const valColor=r.st==='short'?'color:#dc2626':r.st==='excess'?'color:#d97706':'color:#94a3b8';
    // ★ Multi-user badge
    const muBadge=r.cu&&r.cu.userCount>1
      ? (r.isConflict
          ? `<span class="bg" style="font-size:8px;background:#f5f3ff;color:#7c3aed;border-color:#c4b5fd;margin-left:4px">⚡${r.cu.userCount}u conflict</span>`
          : `<span class="bg bgp" style="font-size:8px;margin-left:4px">👥${r.cu.userCount}u</span>`)
      : '';
    // ★ Lock badge
    const lockBadge=r.locked?'<span class="bg bgg" style="font-size:8px;margin-left:4px">🔒</span>':'';
    // ★ Lock/Resolve actions (master only)
    const actions=isMaster
      ? (!r.locked
          ? `<button class="btn bgh bsm" style="padding:2px 7px;font-size:10px" onclick="lockPart('${esc(r.item.partNo)}');rVariance()">🔒 Lock</button>`
          : `<span style="font-size:10px;color:#94a3b8">🔒 Locked</span>`)
        + (r.isConflict
          ? ` <button class="btn bwa bsm" style="padding:2px 7px;font-size:10px" onclick="resolveConflict('${esc(r.item.partNo)}')">⚡ Resolve</button>`
          : '')
      : '';
    tbody+='<tr style="'+(r.isConflict?'background:#f5f3ff':'')+'">'
      +'<td style="font-size:10px">'+(st2+i+1)+'</td>'
      +'<td class="tpn">'+esc(r.item.partNo)+lockBadge+muBadge+'</td>'
      +'<td>'+esc(tr2(r.item.desc,20))+'</td>'
      +'<td><span class="bg bgp" style="font-size:9px">'+esc(r.item.bin||'—')+'</span></td>'
      +'<td class="tq">'+r.dms+'</td>'
      +'<td class="tq">'+(r.cnt!==null?r.cnt:'—')+'</td>'
      +'<td class="tq '+dc+'">'+ds+'</td>'
      +'<td class="tq" style="color:#64748b;font-size:11px">₹'+dlc.toFixed(2)+'</td>'
      +'<td class="tq" style="'+valColor+';font-weight:700">'+val+'</td>'
      +'<td><span class="bg '+sb+'">'+sl[r.st]+'</span></td>'
      +(isMaster?'<td style="white-space:nowrap">'+actions+'</td>':'')
      +'</tr>';
  });
  if(!tbody)tbody='<tr><td colspan="'+(isMaster?11:10)+'" style="text-align:center;padding:24px;color:#94a3b8">No items</td></tr>';
  let valBar='';
  if(dlcTot.short>0||dlcTot.excess>0){
    valBar='<div style="display:flex;gap:16px;padding:12px 16px;background:#f8fafc;border-top:1px solid var(--bd);flex-wrap:wrap;align-items:center">'
      +'<div style="font-size:12px;font-weight:700;color:#dc2626">🔻 Short Value: ₹'+Math.round(dlcTot.short).toLocaleString('en-IN')+'</div>'
      +'<div style="font-size:12px;font-weight:700;color:#d97706">🔺 Excess Value: ₹'+Math.round(dlcTot.excess).toLocaleString('en-IN')+'</div>'
      +'<div style="font-size:12px;font-weight:800;color:#0f172a;margin-left:auto">💰 Total Impact: ₹'+Math.round(dlcTot.short+dlcTot.excess).toLocaleString('en-IN')+'</div>'
      +'</div>';
  }
  const colHeaders='<th>#</th><th>Part No</th><th>Description</th><th>Bin</th><th>DMS</th><th>Final Count</th><th>Diff</th><th>DLC Rate</th><th>💰 Value</th><th>Status</th>'+(isMaster?'<th>Actions</th>':'');
  w.innerHTML='<div class="tw"><table><thead><tr>'+colHeaders+'</tr></thead><tbody>'+tbody+'</tbody></table></div>'+valBar;
  if(pag){
    let h='<span class="pi">'+(st2+1)+'–'+Math.min(st2+p.sz,tot)+' of '+tot+'</span>';
    h+='<button class="pb" onclick="vpg('+(p.p-1)+')" '+(p.p<=1?'disabled':'')+'>‹</button>';
    for(let i=Math.max(1,p.p-2);i<=Math.min(pages,p.p+2);i++)
      h+='<button class="pb '+(i===p.p?'on':'')+'" onclick="vpg('+i+')">'+i+'</button>';
    h+='<button class="pb" onclick="vpg('+(p.p+1)+')" '+(p.p>=pages?'disabled':'')+'>›</button>';
    pag.innerHTML=h;
  }
}

// ★ NEW: Apply supervisor-selected final count and lock the part
async function applyFinalCount(partNo, dms){
  const sel=document.querySelector('input[name=RSEL]:checked');
  if(!sel){toast('Select a count value','w');return;}
  let qty=sel.value==='custom'?parseInt($('RCUSTOM')?.value||0):parseInt(sel.value)||0;
  const {variance,status}=calcVariance(qty,dms);
  let reason='Supervisor final count resolution';
  if(variance!==0){
    closeMd();
    reason=await promptReason(partNo,variance,status);
    if(reason===null){toast('Resolution cancelled','w');return;}
  } else {
    closeMd();
  }
  // Save as supervisor's definitive entry (will overwrite own entry)
  const existingEntry=(S.allCounts||[]).find(c=>
    c.partNo===partNo && c.date===today() && c.auditor===S.user.username
  );
  const r=await api({action:'saveCount',count:{
    id:existingEntry?existingEntry.id:uid(),
    partNo, desc:findItem(partNo)?.desc||'',
    bin:findItem(partNo)?.bin||'', date:today(), qty,
    time:nowt(), type:'Manual',
    remarks:`[SUPERVISOR RESOLVED] ${reason}`,
    auditor:S.user.username, auditorName:S.user.name,
    sessionId:S.auditS?.sessionId||'SESS001', dmsRefDate:today()
  }});
  if(r.success){
    appendHistory({
      partNo, user:S.user.username, userName:S.user.name,
      countedQty:qty, systemQty:dms, variance, status,
      reason:`[SUPERVISOR RESOLVED] ${reason}`, date:today(), time:nowt(),
      type:'Manual', action:'SUPERVISOR_RESOLVED'
    });
    lockPart(partNo); // auto-lock after supervisor resolution
    toast(`✅ Final count set: ${partNo} = ${qty} units. Part locked.`,'s',4000);
    rVariance();
  } else toast(r.error||'Failed','d');
}

function dFT(){
  const w=$('FTBL'),pag=$('FPAG');if(!w)return;
  const cm=S.pd.fm||{};const s=($('FSS')?.value||'').toUpperCase(),b=$('FSB')?.value||'',st=$('FSST')?.value||'',cat=$('FSC')?.value||'';
  const p=S.pg.f||{p:1,sz:PGSZ};
  let rows=S.items.map(item=>{const c=cm[item.partNo];const cnt=c??null;const dms=parseFloat(item.systemQty)||0;const diff=cnt!==null?cnt-dms:null;const st2=cnt===null?'notcounted':diff===0?'match':diff<0?'short':'excess';return{item,cnt,dms,diff,st:st2};});
  if(s)rows=rows.filter(r=>(r.item.partNo||'').toUpperCase().includes(s)||(r.item.desc||'').toUpperCase().includes(s));
  if(b)rows=rows.filter(r=>(r.item.bin||'')===b);if(st)rows=rows.filter(r=>r.st===st);if(cat)rows=rows.filter(r=>(r.item.category||'')===cat);
  rows.sort((a,bb)=>({short:0,excess:1,match:2,notcounted:3}[a.st]||3)-({short:0,excess:1,match:2,notcounted:3}[bb.st]||3));
  const tot=rows.length,pages=Math.ceil(tot/p.sz),st2=(p.p-1)*p.sz;
  const sl={match:'Match',short:'Short',excess:'Excess',notcounted:'Not Counted'};
  w.innerHTML=`<div class="tw"><table><thead><tr><th>#</th><th>Part No</th><th>Description</th><th>Cat</th><th>Bin</th><th>DMS</th><th>Counted</th><th>Diff</th><th>Status</th></tr></thead>

let dailyRows=[];
function prevDaily(input){
  const f=input.files[0];if(!f)return;
  const area=$('DAILYPREV');
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(Boolean);
    dailyRows=lines.slice(1).map(l=>l.split(',').map(v=>(v||'').trim().replace(/"/g,''))).filter(r=>r[0]).map(r=>({
      partNo:r[0].trim(),hsn:r[1]||'',desc:r[2]||'',mrp:parseFloat(r[3])||0,
      dlc:parseFloat(r[4])||0,moq:parseInt(r[5])||1,systemQty:parseInt(r[6])||0,
      category:r[7]||'',unit:'Nos'
    }));
    area.innerHTML=`<div class="snpc">
      <div style="font-size:16px;font-weight:800">${dailyRows.length} parts found in file</div>
      <div style="font-size:12px;color:#475569;margin-top:4px">${f.name} · ${dailyRows.filter(d=>S.items.find(i=>i.partNo===d.partNo)).length} matched in items sheet</div>
    </div>
    <div class="al als">✅ This will update System Qty for all matched parts immediately.</div>
    <div style="display:flex;gap:9px">
      <button class="btn bpr" onclick="applyDailyStock()">⚡ Update Stock Now</button>
      <button class="btn bgh" onclick="$('DAILYPREV').innerHTML='';dailyRows=[]">Cancel</button>
    </div>`;
  };
  reader.readAsText(f);
}

async function applyDailyStock(){
  if(!dailyRows.length){toast('No data','w');return;}
  const btn=document.querySelector('#DAILYPREV .bpr');
  if(btn){btn.disabled=true;btn.textContent='Updating…';}
  // Batch update — send in chunks of 200
  let totalUpdated=0;
  // First save as items update
  for(let i=0;i<dailyRows.length;i+=200){
    const chunk=dailyRows.slice(i,i+200);
    const r=await api({action:'importItems',items:chunk,mode:'update_existing'});
    if(r.success) totalUpdated+=(r.updated||0);
  }
  // Refresh items cache
  await syncItems();
  toast(`✅ Stock updated! ${totalUpdated} parts updated in items sheet`,'s',5000);
  $('DAILYPREV').innerHTML=`<div class="al als">✅ Done! ${totalUpdated} parts updated. Items sheet System Qty is now current.</div>`;
  dailyRows=[];
}

function prevDMS(input){const f=input.files[0];if(!f)return;const area=$('DMSPREV');const reader=new FileReader();reader.onload=e=>{const lines=e.target.result.split('\n').filter(Boolean);dmRows=lines.slice(1).map(l=>l.split(',').map(v=>(v||'').trim().replace(/"/g,''))).filter(r=>r[0]).map(r=>({partNo:r[0].trim(),hsn:r[1]||'',desc:r[2]||'',mrp:parseFloat(r[3])||0,dlc:parseFloat(r[4])||0,moq:parseInt(r[5])||1,dmsQty:parseInt(r[6])||0,category:r[7]||'',unit:'Nos'}));area.innerHTML=`<div class="snpc"><div style="font-size:16px;font-weight:800">${dmRows.length} parts found</div><div style="font-size:12px;margin-top:4px;color:#475569">${f.name} · ${dmRows.filter(d=>S.items.find(i=>i.partNo===d.partNo)).length} matched in items sheet</div></div><div class="fl" style="margin-bottom:10px"><label class="fll">Snapshot Name</label><input class="fi" id="DSNM" value="${f.name.replace(/\.[^.]+$/,'').replace(/_/g,' ')}"></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><input type="checkbox" id="DSACT" checked style="width:14px;height:14px;accent-color:#2563eb"><label for="DSACT" style="font-size:13px;font-weight:500;cursor:pointer">Set as Active Snapshot</label></div><div style="display:flex;gap:9px"><button class="btn bpr" onclick="saveDMS()">💾 Save Snapshot</button><button class="btn bgh" onclick="$('DMSPREV').innerHTML=''">Cancel</button></div><div id="APPLYP" style="display:none;margin-top:12px"><div class="al alw">✅ Saved! Now update System Qty in items sheet?<div style="margin-top:9px;display:flex;gap:8px"><button class="btn bsu bsm" onclick="applyDMS()">✅ Yes, Apply to Items Sheet</button><button class="btn bgh bsm" onclick="$('APPLYP').style.display='none'">Skip</button></div></div></div>`;};reader.readAsText(f);}
async function saveDMS(){if(!dmRows.length){toast('No data','w');return;}const name=$('DSNM')?.value||'DMS-'+today(),setAct=$('DSACT')?.checked;const r=await api({action:'saveDMSSnapshot',snapshot:{name,date:today(),time:nowt(),uploadedBy:S.user.username,totalParts:dmRows.length}});if(!r.success){toast('Failed: '+r.error,'d');return;}dmSid=r.snapshotId;for(let i=0;i<dmRows.length;i+=200)await api({action:'saveDMSItems',snapshotId:dmSid,items:dmRows.slice(i,i+200).map(d=>({...d,snapshotId:dmSid}))});if(setAct)await api({action:'setActiveSnapshot',snapshotId:dmSid});toast('Snapshot saved!','s');const p=$('APPLYP');if(p)p.style.display='block';}
async function applyDMS(){if(!dmSid)return;if(!confirm('Update System Qty in items sheet from this DMS data?\nPhysical count records will NOT be affected.'))return;const r=await api({action:'applySnapshotToMaster',snapshotId:dmSid});if(r.success){toast(`Updated ${r.updated||0} items in items sheet`,'s');const p=$('APPLYP');if(p)p.style.display='none';await syncItems();}else toast(r.error||'Failed','d');}
async function setSnap(id){const r=await api({action:'setActiveSnapshot',snapshotId:id});if(r.success){toast('Updated','s');rDMS();}else toast(r.error||'Failed','d');}

// QR GENERATOR — Local Parts (Official Hero Format)
// ═══════════════════════════════════════════════════════════
let QRGenData={filter:'',page:1,sz:120,items:[]};

// ── HMCL QR FORMAT BUILDER ──────────────────────────────────
// Official format: D/DEALER/BATCH/PARTNO/QTY(6d)/PRICE(10.2f)/PLANT/SEQ/G/000/00
const HMCL_DEALER = 'INDMTR0000000000'; // India Motors dealer code — update to your actual HMCL dealer code
const HMCL_PLANT  = 'AAG';              // Default HMCL plant code

function buildHMCLqr(item, qty){
  const q   = qty || Math.max(1, parseInt(item.systemQty)||1);
  const mrp = parseFloat(item.mrp)||0;
  const batch = genBatchCode();
  // Field formats as per HMCL standard
  const qtyStr   = String(q).padStart(6,'0');
  const priceStr = mrp.toFixed(2).padStart(10,'0');
  const seq      = '1';
  return `D/${HMCL_DEALER}/${batch}/${item.partNo}/${qtyStr}/${priceStr}/${HMCL_PLANT}/${seq}/G/000/00`;
}

function genBatchCode(){
  // 12-char alphanumeric batch code (date-based like HMCL)
  const d=new Date();
  const mo=['A','B','C','D','E','F','G','H','J','K','L','M'][d.getMonth()];
  const yr=String(d.getFullYear()).slice(-2);
  const day=String(d.getDate()).padStart(2,'0');
  const rand=Math.random().toString(36).toUpperCase().slice(2,8);
  return `L${yr}${mo}${day}${rand}`;
}

  pg.innerHTML=`
  <div class="print-header"><h2>🏍️ India Motors — QR Label Sheet</h2><p>Local Parts · ${new Date().toLocaleDateString('en-IN')}</p></div>
  <div class="ph" style="align-items:center">
    <div><div class="pt">⬡ QR Code Generator</div><div class="ps">Local Parts Only — Scan-compatible with Hero DMS format</div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">

      <div style="min-width:160px"><label class="fll">Category</label>

          <option value="">All Local Parts</option>${catOpts}
        </select></div>

          <option value="80">Tiny (80px)</option>

          <option value="200">Large (200px)</option>

      <span>·</span>
      <span style="color:#94a3b8">QR format: <code style="background:#e2e8f0;padding:1px 5px;border-radius:3px;font-size:10px">PARTNO|DESC|BIN</code> — compatible with Hero DMS scanner</span>
    </div>
  </div>
  <div id="QRGRID" class="qr-grid"></div>

function qrFilter(){
  const q=($('QRSI')?.value||'').trim().toLowerCase();
  const cat=$('QRCAT')?.value||'';
  QRGenData.sz=parseInt($('QRSZ')?.value)||120;
  QRGenData.filter=q; QRGenData.page=1;
  QRGenData.items=S.items.filter(i=>{
    const catOk=cat?(i.category||'')===(cat):(i.category||'').toLowerCase().includes('local');
    return catOk&&(!q||((i.partNo||'').toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q)));
  });
  if($('QRCOUNT'))$('QRCOUNT').textContent=QRGenData.items.length;
  qrRenderPage();
}

function qrRenderPage(){
  const grid=$('QRGRID'),pag=$('QRPAG');if(!grid)return;
  const items=QRGenData.items, sz=QRGenData.sz||120, pgsz=24;
  const pages=Math.max(1,Math.ceil(items.length/pgsz));
  const p=Math.max(1,Math.min(QRGenData.page,pages));
  QRGenData.page=p;
  const slice=items.slice((p-1)*pgsz,p*pgsz);
  if(!items.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8"><div style="font-size:48px;margin-bottom:12px">🔍</div><div style="font-size:15px;font-weight:600">No Local Parts found</div><div style="font-size:12px;margin-top:6px">Add items with "LOCAL" in category name</div></div>';
    pag.innerHTML='';return;
  }
  grid.innerHTML=slice.map((item,i)=>{
    const safeDesc=(item.desc||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const safeBin=(item.bin||'').replace(/'/g,"\\'");
    return`<div class="qr-card" onclick="qrZoom('${esc(item.partNo)}','${safeDesc}','${safeBin}')">
      <canvas id="QRC_${i}" width="${sz}" height="${sz}" style="width:${sz}px;height:${sz}px;max-width:100%"></canvas>
      <div class="qr-pn">${esc(item.partNo)}</div>
      <div class="qr-desc">${esc(tr2(item.desc||'',34))}</div>
      ${item.bin?`<span class="qr-bin">📍 ${esc(item.bin)}</span>`:''}
      <div style="font-size:9px;color:#94a3b8;margin-top:4px">MRP ₹${item.mrp||0} · DLC ₹${item.dlc||0}</div>
    </div>`;
  }).join('');

  // Load QR images — format: PARTNO only (for scanner compatibility)
  // Hero DMS scanners read just the part number
  for(let i=0;i<slice.length;i++){
    const item=slice[i];
    const canvas=$(`QRC_${i}`);if(!canvas)continue;
    // QR data = just the part number (same as what Hero DMS prints)
    // HMCL Official QR format: D/DEALER/BATCH/PARTNO/QTY/PRICE/PLANT/SEQ/G/000/00
    const qrData=buildHMCLqr(item);
    const qrSz=sz*2;
    const url=`https://api.qrserver.com/v1/create-qr-code/?size=${qrSz}x${qrSz}&data=${encodeURIComponent(qrData)}&ecc=H&margin=1`;
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=((c,im)=>()=>{const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(im,0,0,c.width,c.height);})(canvas,img);
    img.onerror=((c,it)=>()=>{const ctx=c.getContext('2d');ctx.fillStyle='#f0f4ff';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#2563eb';ctx.font=`bold ${Math.floor(c.width/10)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(it.partNo.slice(0,12),c.width/2,c.height/2);})(canvas,item);
    img.src=url;
  }

  // Pagination
  if(pages>1){
    let h=`<span class="pi">Page ${p}/${pages} · ${items.length} parts</span>`;
    h+=`<button class="pb" onclick="qrPg(${p-1})" ${p<=1?'disabled':''}>‹ Prev</button>`;
    for(let i=Math.max(1,p-2);i<=Math.min(pages,p+2);i++)h+=`<button class="pb ${i===p?'on':''}" onclick="qrPg(${i})">${i}</button>`;
    h+=`<button class="pb" onclick="qrPg(${p+1})" ${p>=pages?'disabled':''}>Next ›</button>`;
    pag.innerHTML=h;
  }else pag.innerHTML='';
}

function qrPg(n){QRGenData.page=n;qrRenderPage();}

function qrZoom(pn,desc,bin){
  const sz=220;
  // Build official HMCL QR format for this part
  const item=findItem(pn)||{partNo:pn,desc:desc,bin:bin,mrp:0,dlc:0,systemQty:1};

// SALES DATA ENGINE — Google Sheets Persistent Store
// ═══════════════════════════════════════════════════════════
// In-memory: S_SALES_MAP[partNo][YYYY-MM] = qty
// S_SALES_INFO[partNo] = {desc, cat, dlc}
let S_SALES_MAP  = {};   // aggregated monthly data (Paid+FOC only — for movement)
let S_SALES_BILL = {};   // per-billable-type: {type: {partNo: {month: qty}}}
let S_SALES_INFO = {};   // part metadata
let S_SALES_META = null; // {totalRows, months[], dateFrom, dateTo, uniqueParts, billTypes[]}
let S_SALES_LOADED = false;

async function ensureSalesLoaded(){
  if(S_SALES_LOADED) return true;
  if(!S.online) return false; // offline — just return false, page renders without sales data
  try {
    const r = await api({action:'getSalesData'});
    if(r.success){
      buildSalesMap(r.rows||[]);
      S_SALES_META = r.meta;
      S_SALES_LOADED = true;
      return true;
    }
    return false;
  } catch(e) {
    return false; // network error — page still renders without sales data
  }
}

function buildSalesMap(rows){
  S_SALES_MAP  = {};
  S_SALES_BILL = {};
  S_SALES_INFO = {};
  rows.forEach(r=>{
    if(!r.partNo||r.qty<=0) return;
    const bt = r.billableType||'Paid';
    // Movement map: only Paid + FOC count as real demand
    if(bt==='Paid'||bt==='FOC'){
      if(!S_SALES_MAP[r.partNo]) S_SALES_MAP[r.partNo]={};
      S_SALES_MAP[r.partNo][r.month] = (S_SALES_MAP[r.partNo][r.month]||0)+r.qty;
    }
    // Per-billable-type breakdown
    if(!S_SALES_BILL[bt]) S_SALES_BILL[bt]={};
    if(!S_SALES_BILL[bt][r.partNo]) S_SALES_BILL[bt][r.partNo]={};
    S_SALES_BILL[bt][r.partNo][r.month] = (S_SALES_BILL[bt][r.partNo][r.month]||0)+r.qty;
    if(!S_SALES_INFO[r.partNo])
      S_SALES_INFO[r.partNo]={desc:r.desc,cat:r.cat,dlc:r.dlc};
  });
}

// Parse UTF-16 LE Hero DMS CSV — returns aggregated monthly rows for GSheets
function parseHeroDMScsv(buffer){
  // Decode UTF-16 LE
  let text='';
  const bytes=new Uint8Array(buffer);
  // Check BOM FF FE
  let start=(bytes[0]===0xFF&&bytes[1]===0xFE)?2:0;
  const u16=new Uint16Array(buffer, start%2===0?start:0);
  // Use TextDecoder for proper UTF-16
  try{
    const dec=new TextDecoder('utf-16le');
    text=dec.decode(new Uint8Array(buffer).slice(start));
  }catch(e){
    // Fallback: manual decode
    for(let i=start;i<bytes.length-1;i+=2){
      text+=String.fromCharCode(bytes[i]|(bytes[i+1]<<8));
    }
  }
  // Remove BOM char if present
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);

  const lines=text.split(/\r?\n/);
  if(lines.length<2) return {rows:[],error:'Empty file'};

  // Monthly aggregation: partNo+month → {qty, dlc, desc, cat}
  const agg={};
  const partInfo={};

  for(let li=1;li<lines.length;li++){
    const line=lines[li].trim();
    if(!line) continue;
    // Tab-separated, values quoted
    const cols=line.split('\t').map(c=>c.replace(/^"|"$/g,'').trim());
    if(cols.length<16) continue;
    const partNo=cols[0].replace(/\s/g,'');
    if(!partNo||partNo==='Part#'||partNo==='-') continue;
    const qty=parseFloat((cols[2]||'').replace(/,/g,''))||0;
    if(qty<=0) continue;
    // Billable Type col[3]: Paid / Warranty / FOC / Recommended Warranty / SPD Warranty
    const billableType=(cols[3]||'Paid').replace(/\s+/g,' ').trim()||'Paid';
    // Price col[9] = DLC rate (ex-GST dealer cost)
    const dlc=parseFloat((cols[9]||'').replace(/Rs\.\s*/i,'').replace(/,/g,'').replace(/[()]/g,'').trim())||0;
    // Total col[15]
    const total=parseFloat((cols[15]||'').replace(/Rs\.\s*/i,'').replace(/,/g,'').replace(/[()]/g,'').trim())||0;
    const desc=(cols[1]||'').replace(/\s+/g,' ').trim();
    const cat=(cols[16]||'').replace(/\s+/g,' ').trim();
    // Close date col[12]: DD/MM/YYYY HH:MM:SS
    const datePart=(cols[12]||'').split(' ')[0];
    let month='';
    if(datePart&&datePart.includes('/')){
      const [d,m,y]=datePart.split('/');
      if(y&&m) month=`${y}-${String(m).padStart(2,'0')}`;
    }
    if(!month) continue;
    // Key includes billableType — Paid & Warranty stored as separate rows
    const key=`${partNo}__${month}__${billableType}`;
    if(!agg[key]) agg[key]={partNo,desc,cat,month,qty:0,dlc:0,billableType};
    agg[key].qty+=qty;
    if(!agg[key].dlc&&dlc) agg[key].dlc=dlc;
    if(!partInfo[partNo]) partInfo[partNo]={desc,cat,dlc};
  }

  const rows=Object.values(agg);
  const months=[...new Set(rows.map(r=>r.month))].sort();
  const uniqueParts=[...new Set(rows.map(r=>r.partNo))];

  // Billable type summary
  const billSummary={};
  rows.forEach(r=>{
    if(!billSummary[r.billableType]) billSummary[r.billableType]={parts:new Set(),qty:0};
    billSummary[r.billableType].parts.add(r.partNo);
    billSummary[r.billableType].qty+=r.qty;
  });

  return{
    rows,
    months,
    uniqueParts:uniqueParts.length,
    dateFrom:months[0]||'',
    dateTo:months[months.length-1]||'',
    totalQtyRows:rows.reduce((s,r)=>s+r.qty,0),
    billSummary:Object.fromEntries(Object.entries(billSummary).map(([k,v])=>[k,{parts:v.parts.size,qty:v.qty}]))
  };
}

// Classify movement based on monthly data
function classifyPart(monthlyQtys, allMonths){
  const totalMonths=allMonths.length||6;
  const totalQty=Object.values(monthlyQtys).reduce((s,q)=>s+q,0);
  const activeMonths=Object.keys(monthlyQtys).filter(m=>monthlyQtys[m]>0).length;
  const avgMonthly=totalQty/totalMonths;
  if(totalQty===0) return{class:'dead',avgMonthly:0,totalQty:0,activeMonths:0};
  if(avgMonthly>=10||activeMonths>=totalMonths*0.8) return{class:'fast',avgMonthly,totalQty,activeMonths};
  if(avgMonthly>=2||activeMonths>=totalMonths*0.5) return{class:'medium',avgMonthly,totalQty,activeMonths};
  if(avgMonthly>0) return{class:'slow',avgMonthly,totalQty,activeMonths};
  return{class:'dead',avgMonthly:0,totalQty:0,activeMonths:0};
}

function getSalesStatsForPeriod(monthsBack){
  const meta=S_SALES_META;
  if(!meta||!meta.months||!meta.months.length) return{};

  // Get last N months from available data
  const allMonths=[...meta.months].sort();
  const useMonths=allMonths.slice(-monthsBack);

  const result={};
  Object.keys(S_SALES_MAP).forEach(pn=>{
    const monthly=S_SALES_MAP[pn];
    const filtered={};
    useMonths.forEach(m=>{ if(monthly[m]) filtered[m]=monthly[m]; });
    const cls=classifyPart(filtered, useMonths);
    result[pn]={...cls, months:useMonths, info:S_SALES_INFO[pn]||{}};
  });
  return result;
}

let _mvCurrentStats=null,_mvCurrentFilter='all';

function mvShowTab(filter){
  _mvCurrentFilter=filter;
  // Update tab buttons
  ['all','fast','medium','slow','3m'].forEach(t=>{
    const btn=$(`MVTAB_${t}`);if(btn){btn.classList.toggle('on',t===filter);}
  });

  const stats6=getSalesStatsForPeriod(6);
  const stats3=getSalesStatsForPeriod(3);
  const use=filter==='3m'?stats3:stats6;
  const period=filter==='3m'?3:6;

  let entries=Object.entries(use);
  if(filter==='fast')     entries=entries.filter(([,v])=>v.class==='fast');
  else if(filter==='medium') entries=entries.filter(([,v])=>v.class==='medium');
  else if(filter==='slow')   entries=entries.filter(([,v])=>v.class==='slow');

  entries.sort((a,b)=>b[1].avgMonthly-a[1].avgMonthly);
  _mvCurrentStats=entries;

  const title=$('MVTBLTITLE');
  if(title){const labels={all:'All Parts',fast:'🔥 Fast Moving',medium:'⚡ Medium Moving',slow:'🐌 Slow Moving','3m':'3-Month'};
    title.textContent=`${labels[filter]||filter} — ${entries.length} parts · ${period}M analysis`;}

  renderMvTable(entries,period);
}

function mvFilterTable(){

// Returns the next month string after a YYYY-MM input
function nextMonth(ym){
  if(!ym)return'';
  const[y,m]=ym.split('-').map(Number);
  if(!y||!m)return'';
  const d=new Date(y,m,1);// JS month is 0-based, so m = next month automatically
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function btRenderTable(){
  const tbl=$('BTTBL');
  if(!tbl) return;
  const srch=($('BTSRCH')?.value||'').toLowerCase().trim();
  const catF=$('BTCATF')?.value||'';
  const sortBy=$('BTSORT')?.value||'qty';

  // Build rows: for each part, collect qty per bill type
  const partData={}; // partNo -> {desc,cat,dlc, types:{bt:qty}}
  const typesToShow=_btFilter==='ALL'?Object.keys(S_SALES_BILL):[_btFilter];

  typesToShow.forEach(bt=>{
    const partsMap=S_SALES_BILL[bt]||{};
    Object.keys(partsMap).forEach(pn=>{
      if(!partData[pn]){
        const info=S_SALES_INFO[pn]||{};
        partData[pn]={desc:info.desc||'',cat:info.cat||'',dlc:info.dlc||0,types:{}};
      }
      const qty=Object.values(partsMap[pn]).reduce((s,q)=>s+q,0);
      partData[pn].types[bt]=(partData[pn].types[bt]||0)+qty;
    });
  });

  // Filter
  let rows=Object.entries(partData).filter(([pn,v])=>{
    if(srch&&!pn.toLowerCase().includes(srch)&&!v.desc.toLowerCase().includes(srch)) return false;
    if(catF&&v.cat!==catF) return false;
    return true;
  });

  // Sort
  rows.sort((a,b)=>{
    if(sortBy==='qty'){
      const qa=Object.values(a[1].types).reduce((s,q)=>s+q,0);
      const qb=Object.values(b[1].types).reduce((s,q)=>s+q,0);
      return qb-qa;
    }
    if(sortBy==='parts') return Object.keys(b[1].types).length-Object.keys(a[1].types).length;
    return a[0].localeCompare(b[0]);
  });

  if(!rows.length){
    tbl.innerHTML='<div class="emp"><div class="emp-i">🔍</div><div class="emp-t">No parts found</div></div>';
    return;

function genOrderPlan(){
  if(!S_SALES_META||!S_SALES_META.totalRows){toast('Upload sales data first','w');return;}

  const coverWeeks  = Math.max(1,parseFloat($('OPCOV')?.value)||4);
  const safetyWeeks = Math.max(0,parseFloat($('OPSAF')?.value)||2);
  const leadDays    = Math.max(1,parseFloat($('OPLT')?.value)||7);
  const budgetCap   = Math.max(1,parseFloat($('OPBUD')?.value)||725000);
  const inclZero    = $('OPZERO')?.checked||false;
  const useMonthly  = $('OPMOQ')?.checked!==false;
  const selCats     = new Set([...(document.querySelectorAll('#OPCATS input:checked')||[])].map(cb=>cb.value));

  const totalCoverMonths = (coverWeeks+safetyWeeks)/4.33;
  const leadMonths       = leadDays/30;

  // Get 6M sales stats
  const stats6=getSalesStatsForPeriod(6);
  const hasPortal=ORDER_PORTAL.length>0;

  const plan=[];

  S.items.forEach(item=>{
    if(selCats.size&&!selCats.has(item.category||'')) return;

    const pn=item.partNo;
    const v=stats6[pn];
    const avgMonthly=v?v.avgMonthly:0;

    // ★ KEY RULE: If zero sales in 6 months → DO NOT ORDER (no exceptions)
    if(avgMonthly<=0) return;

    const currentStock=Math.max(0,parseFloat(item.systemQty)||0);
    const dlc=Math.max(0,parseFloat(item.dlc)||parseFloat(item.mrp)||0);
    const moq=Math.max(1,parseInt(item.moq)||1);

    // Reorder point = demand during lead time + safety buffer
    const rop=avgMonthly*(leadMonths+(safetyWeeks/4.33));
    // Required stock for cover period
    const required=avgMonthly*totalCoverMonths;
    // Order qty = required − current stock
    let qty=required-currentStock;

    // If stock is 0 and inclZero, ensure at least MOQ
    if(currentStock===0&&inclZero&&qty<moq) qty=moq;
    if(qty<=0) return;

    // Round up to MOQ
    if(useMonthly) qty=Math.ceil(qty/moq)*moq;
    else qty=Math.ceil(qty);

    const priority=currentStock===0?'critical':currentStock<=rop?'high':'medium';
    const stockDays=avgMonthly>0?Math.round((currentStock/avgMonthly)*30):999;
    const portal=hasPortal?ORDER_PORTAL.find(o=>o.partNo===pn.toUpperCase()):null;

    plan.push({
      partNo:pn, desc:item.desc||'', cat:item.category||'', bin:item.bin||'',
      currentStock, avgMonthly, rop:Math.round(rop*10)/10,
      dlc, moq, qty, totalCost:qty*dlc,
      priority, stockDays,
      salesTotal:v.totalQty, salesMonths:v.activeMonths,
      portalQty:portal?.orderQty||0,
      reduced:false
    });
  });

  // Sort: critical → high → medium, then by avgMonthly desc
  const pRank={critical:0,high:1,medium:2};
  plan.sort((a,b)=>(pRank[a.priority]-pRank[b.priority])||b.avgMonthly-a.avgMonthly);

  // ★ Budget cap — greedy allocation with partial fill
  let budgetUsed=0;
  const finalPlan=[];
  const skipped=[];

  for(const item of plan){
    const remaining=budgetCap-budgetUsed;
    if(item.totalCost<=remaining){
      finalPlan.push({...item,budgetOk:true});
      budgetUsed+=item.totalCost;
    } else if(remaining>=item.dlc&&item.dlc>0){
      // Partial — fit as many MOQ blocks as budget allows
      const maxQty=Math.floor(remaining/item.dlc/item.moq)*item.moq;
      if(maxQty>0){
        finalPlan.push({...item,qty:maxQty,totalCost:maxQty*item.dlc,budgetOk:true,reduced:true});
        budgetUsed+=maxQty*item.dlc;
      } else {
        skipped.push(item);
      }
    } else {
      skipped.push(item);
    }
  }

  _opPlan=finalPlan; _opSkipped=skipped;
  _opParams={coverWeeks,safetyWeeks,leadDays,budgetCap,hasPortal};

  renderOrderPlanResult(finalPlan,skipped,budgetUsed,budgetCap,hasPortal);
}

// Stores trail in localStorage (+ GSheets via counts metadata)
const TRAIL_KEY='imAuditTrail3';

function logTrail(action, partNo, desc, oldVal, newVal, extra){
  try{
    const entry={
      id: uid(),
      ts: new Date().toISOString(),
      date: today(),
      time: nowt(),
      user: S.user?.username||'',
      userName: S.user?.name||'',
      role: S.user?.role||'',
      action,
      partNo: partNo||'',
      desc: desc||'',
      oldVal: String(oldVal||''),
      newVal: String(newVal||''),
      extra: extra||'',
      flagged: false,
      resolved: false,
      resolvedBy: '',
      resolvedNote: ''
    };
    // Save to localStorage (local backup)
    const trail=JSON.parse(localStorage.getItem(TRAIL_KEY)||'[]');
    trail.unshift(entry);
    localStorage.setItem(TRAIL_KEY, JSON.stringify(trail.slice(0,500)));
    // Save to Google Sheets (persistent, visible to master+owner)
    if(S.online){
      api({action:'saveTrailEntry',entry}).catch(()=>{}); // fire-and-forget
    }
  }catch(e){}
}

function getTrail(){ try{ return JSON.parse(localStorage.getItem(TRAIL_KEY)||'[]'); }catch{return[];} }
function saveTrail(trail){ localStorage.setItem(TRAIL_KEY, JSON.stringify(trail)); }

let _atCurrentTrail=[];
function atFilter(type){
  const trail=getTrail();
  let filtered=trail;
  if(type==='today')     filtered=trail.filter(t=>t.date===today());
  else if(type==='counts')  filtered=trail.filter(t=>t.action.startsWith('COUNT'));
  else if(type==='items')   filtered=trail.filter(t=>t.action.startsWith('ITEM'));
  else if(type==='flagged') filtered=trail.filter(t=>t.flagged&&!t.resolved);
  else if(type==='resolved')filtered=trail.filter(t=>t.resolved);
  _atCurrentTrail=filtered;
  renderTrailTable(filtered,type);
}

function atFilterPart(){
  const q=($('ATPART')?.value||'').trim().toLowerCase();
  const trail=getTrail();
  const filtered=q?trail.filter(t=>t.partNo.toLowerCase().includes(q)||(t.desc||'').toLowerCase().includes(q)):trail;
  _atCurrentTrail=filtered;
  renderTrailTable(filtered,'search');
}

function flagTrailEntry(id){
  const note=prompt('Reason for flagging (optional):');
  const trail=getTrail();
  const entry=trail.find(t=>t.id===id);
  if(!entry)return;
  entry.flagged=true;
  entry.extra=(entry.extra?entry.extra+' | ':'')+`Flagged by ${S.user?.name||S.user?.username} — ${note||'No reason given'}`;
  saveTrail(trail);
  toast('🚩 Entry flagged for review','w');
  atFilter('all');
}

function resolveTrailEntry(id){
  const note=prompt('Resolution note (required):');
  if(!note){toast('Resolution note required','w');return;}
  const trail=getTrail();
  const entry=trail.find(t=>t.id===id);
  if(!entry)return;
  entry.resolved=true;
  entry.resolvedBy=S.user?.name||S.user?.username||'';
  entry.resolvedNote=note;
  entry.resolvedAt=new Date().toISOString();
  saveTrail(trail);
  toast('✅ Discrepancy resolved','s');
  atFilter('all');
}

function clearTrail(){
  if(!confirm('Clear audit entries older than 30 days?'))return;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const trail=getTrail().filter(t=>new Date(t.ts)>=cutoff);
  saveTrail(trail);
  toast('Old entries cleared','s');
  rAuditTrail();
}

function dlTrail(){
  const trail=getTrail();
  const csv='Date,Time,User,Action,Part No,Description,Old Value,New Value,Status,Notes\n'
    +trail.map(t=>`"${t.date||''}","${(t.time||'').slice(0,5)}","${t.userName||t.user||''}","${t.action}","${t.partNo||''}","${(t.desc||'').replace(/"/g,'""')}","${String(t.oldVal||'').replace(/"/g,'""')}","${String(t.newVal||'').replace(/"/g,'""')}","${t.resolved?'Resolved':t.flagged?'Flagged':'Normal'}","${(t.extra||t.resolvedNote||'').replace(/"/g,'""')}"`).join('\n');
  dlCSV(csv,`audit_trail_${today()}.csv`);
  toast(`${trail.length} entries exported`,'s');
}

// FULL INVENTORY ANALYSIS — ALL DMS items vs Sales History
// ═══════════════════════════════════════════════════════════
async function rInvAnalysis(){
  const pg=$('PG');
  // Render immediately with whatever data we have
  renderInvAnalysis();
  // Load sales in background if needed
  if(!S_SALES_LOADED){
    const ok=await ensureSalesLoaded();
    if(ok) renderInvAnalysis(); // refresh with real data
  }
}

function renderInvAnalysis(){
  const pg=$('PG');
  const hasSales=S_SALES_META&&S_SALES_META.totalRows>0;
  const meta=S_SALES_META;

  // Build sales stats for all available months
  const allMonths=hasSales?(meta.months||[]).sort():[];
  const totalMonths=allMonths.length||1;

  // For every item in S.items (full DMS master), compute:
  const rows=S.items.map(item=>{
    const pn=item.partNo;
    const currentStock=parseFloat(item.systemQty)||0;
    const dlc=parseFloat(item.dlc)||parseFloat(item.mrp)||0;
    const mrp=parseFloat(item.mrp)||0;
    const stockValue=currentStock*dlc;

    // Sales data from history
    const monthlyMap=S_SALES_MAP[pn]||{};
    const totalSalesQty=Object.values(monthlyMap).reduce((s,q)=>s+q,0);
    const activeMonths=Object.keys(monthlyMap).filter(m=>monthlyMap[m]>0).length;
    const avgMonthly=totalSalesQty/totalMonths;

    // Coverage: how many months of stock do we have?
    const stockCoverMonths=avgMonthly>0?currentStock/avgMonthly:null;
    const stockCoverDays=avgMonthly>0?Math.round((currentStock/avgMonthly)*30):null;

    // Classification
    let status,statusColor,statusBg,priority;
    if(!hasSales||totalSalesQty===0){
      if(currentStock===0){ status='No Stock · No Sales'; statusColor='#94a3b8'; statusBg='#f8fafc'; priority=6; }
      else { status='Dead Stock'; statusColor='#7c3aed'; statusBg='#f5f3ff'; priority=5; }
    } else if(currentStock===0){
      status='🚨 ZERO STOCK'; statusColor='#dc2626'; statusBg='#fef2f2'; priority=0;
    } else if(stockCoverDays!==null&&stockCoverDays<14){
      status='⚠️ Critical Low'; statusColor='#dc2626'; statusBg='#fff1f2'; priority=1;
    } else if(stockCoverDays!==null&&stockCoverDays<30){
      status='⚡ Low Stock'; statusColor='#d97706'; statusBg='#fffbeb'; priority=2;
    } else if(avgMonthly>=5){
      status='🔥 Fast Moving'; statusColor='#059669'; statusBg=''; priority=3;
    } else if(avgMonthly>=1){
      status='📦 Normal'; statusColor='#2563eb'; statusBg=''; priority=3;
    } else {
      status='🐌 Slow Moving'; statusColor='#d97706'; statusBg='#fffbeb'; priority=4;
    }

    // Excess stock flag
    const isExcess=stockCoverMonths!==null&&stockCoverMonths>6;

    return{
      partNo:pn, desc:item.desc||'', cat:item.category||'', bin:item.bin||'',
      currentStock, dlc, mrp, stockValue,
      totalSalesQty, avgMonthly, activeMonths, stockCoverDays, stockCoverMonths,
      status, statusColor, statusBg, priority, isExcess

  // Sort by priority then by stock value desc
  rows.sort((a,b)=>a.priority-b.priority||b.stockValue-a.stockValue);

let _iaCurrentFilter='all';

function iaFilter(type){
  _iaCurrentFilter=type;
  const rows=window._iaAllRows||[];
  ['all','critical','low','dead','excess','fast','nosale','ghost'].forEach(t=>{
    const btn=$(`IATAB_${t}`);if(btn)btn.classList.toggle('on',t===type);
  });
  let filtered=rows;
  const titleMap={
    all:'All Items',
    critical:'🚨 Zero Stock — Has Sales (Order Immediately)',
    low:'⚡ Low Stock — Under 30 Days Cover',
    dead:'💀 Dead Stock — Zero Sales, Stock Exists',
    excess:'📈 Excess Stock — Over 6 Months Cover',
    fast:'🔥 Fast Moving Parts',
    nosale:'⬜ No Stock & No Sales',
    ghost:'👻 Ghost Parts — Zero Stock & Zero Sales (Not in Inventory)'
  };
  if(type==='critical') filtered=rows.filter(r=>r.currentStock===0&&r.totalSalesQty>0);
  else if(type==='low')  filtered=rows.filter(r=>r.stockCoverDays!==null&&r.stockCoverDays<30&&r.currentStock>0);
  else if(type==='dead') filtered=rows.filter(r=>r.totalSalesQty===0&&r.currentStock>0);
  else if(type==='excess')filtered=rows.filter(r=>r.isExcess);
  else if(type==='fast') filtered=rows.filter(r=>r.avgMonthly>=5);
  else if(type==='nosale')filtered=rows.filter(r=>r.currentStock===0&&r.totalSalesQty===0);
  else if(type==='ghost') filtered=rows.filter(r=>r.currentStock===0&&r.totalSalesQty===0);
  else filtered=rows.filter(r=>r.currentStock>0||r.totalSalesQty>0); // 'all' — exclude ghost parts

  const title=$('IATITLE');if(title)title.textContent=`${titleMap[type]||type} — ${filtered.length} items`;

  // Show/hide ghost section banner
  const ghostSec=$('IA_GHOST_SEC');
  if(ghostSec) ghostSec.style.display=(type==='all'||type==='ghost')?'block':'none';

  iaRenderTable(filtered);
}

function iaSearch(){
  const q=($('IAFILT')?.value||'').trim().toLowerCase();
  const cat=$('IACAT')?.value||'';
  let rows=window._iaAllRows||[];
  if(q) rows=rows.filter(r=>r.partNo.toLowerCase().includes(q)||(r.desc||'').toLowerCase().includes(q));
  if(cat) rows=rows.filter(r=>r.cat===cat);
  const title=$('IATITLE');if(title)title.textContent=`Search results — ${rows.length} items`;
  iaRenderTable(rows);
}

function iaCatFilter(){
  const cat=$('IACAT')?.value||'';
  const q=($('IAFILT')?.value||'').trim().toLowerCase();
  let rows=window._iaAllRows||[];
  if(cat) rows=rows.filter(r=>r.cat===cat);
  if(q) rows=rows.filter(r=>r.partNo.toLowerCase().includes(q)||(r.desc||'').toLowerCase().includes(q));
  const title=$('IATITLE');if(title)title.textContent=`${cat||'All'} — ${rows.length} items`;
  iaRenderTable(rows);
}

// ── Shared helper: build full inventory analytics ──────────
async function ownerBuildData(){
  const [counts, allCounts] = await Promise.all([fetchCounts(today()), fetchCounts()]);
  await ensureSalesLoaded();

  // Build final-count map (mode per part, all users)
  const partUserMap={};
  allCounts.forEach(c=>{
    if(!partUserMap[c.partNo])partUserMap[c.partNo]={};
    const ex=partUserMap[c.partNo][c.auditor];
    if(!ex||c.time>ex.time) partUserMap[c.partNo][c.auditor]=c;
  });
  const cMap={};
  Object.entries(partUserMap).forEach(([pn,byUser])=>{
    const vals=Object.values(byUser).map(e=>parseInt(e.qty)||0);
    const freq={};vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
    let mode=vals[0],maxF=0;
    Object.entries(freq).forEach(([v,f])=>{if(parseInt(f)>maxF){maxF=parseInt(f);mode=parseInt(v);}});
    cMap[pn]=mode;
  });

  let totalStockVal=0,shortVal=0,excessVal=0,deadVal=0;
  let shortCount=0,excessCount=0,deadCount=0,matchCount=0;
  const shortItems=[],excessItems=[],deadItems=[],fastLow=[];

  S.items.forEach(item=>{
    const pn=item.partNo;
    const sysQty=parseFloat(item.systemQty)||0;
    const dlc=parseFloat(item.dlc)||0;
    const mrp=parseFloat(item.mrp)||0;
    const stockVal=sysQty*dlc;
    totalStockVal+=stockVal;

    const salesMonths=S_SALES_MAP[pn]?Object.values(S_SALES_MAP[pn]):[];
    const totalSales=salesMonths.reduce((a,b)=>a+b,0);
    const avgMonthly=salesMonths.length?totalSales/salesMonths.length:0;
    const coverDays=avgMonthly>0?Math.round(sysQty/(avgMonthly/30)):null;

    const physQty=cMap[pn]!==undefined?cMap[pn]:null;
    const variance=physQty!==null?physQty-sysQty:null;

    if(variance!==null){
      if(variance<0){
        shortCount++;shortVal+=Math.abs(variance)*dlc;
        shortItems.push({...item,variance,dlc,mrp,totalSales,avgMonthly,coverDays,stockVal,physQty});
      } else if(variance>0){
        excessCount++;excessVal+=variance*dlc;
        excessItems.push({...item,variance,dlc,mrp,totalSales,avgMonthly,coverDays,stockVal,physQty});
      } else { matchCount++; }
    }
    if(totalSales===0&&sysQty>0){deadCount++;deadVal+=stockVal;deadItems.push({...item,dlc,mrp,stockVal});}
    if(avgMonthly>0&&coverDays!==null&&coverDays<30&&sysQty>=0){
      fastLow.push({...item,dlc,mrp,totalSales,avgMonthly,coverDays,stockVal});
    }
  });

  // Category breakdown
  const catMap={};
  S.items.forEach(i=>{
    const c=i.category||'Uncategorised';
    if(!catMap[c])catMap[c]={count:0,val:0,sales:0};
    catMap[c].count++;catMap[c].val+=(parseFloat(i.systemQty)||0)*(parseFloat(i.dlc)||0);
    const s=S_SALES_MAP[i.partNo];
    if(s)catMap[c].sales+=Object.values(s).reduce((a,b)=>a+b,0);
  });
  const categories=Object.entries(catMap).sort((a,b)=>b[1].val-a[1].val).slice(0,8);

  // User perf
  const userPerf=getUserPerf();
  const users=Object.entries(userPerf).map(([u,d])=>({
    username:u,total:d.totalCounts||0,errors:d.errorCounts||0,
    accuracy:d.totalCounts?Math.round(((d.totalCounts-(d.errorCounts||0))/d.totalCounts)*100):100
  }));

  // Monthly sales trend (from salesMeta months)
  const salesMeta=S_SALES_META;
  const months=salesMeta?.months||[];
  const monthlyTotals=months.map(m=>{
    let tot=0;
    Object.values(S_SALES_MAP).forEach(pm=>{tot+=pm[m]||0;});
    return{month:m,qty:tot};
  }).slice(-6);

  return{
    counts,allCounts,cMap,
    totalStockVal,shortVal,excessVal,deadVal,
    shortCount,excessCount,deadCount,matchCount,
    shortItems:shortItems.sort((a,b)=>Math.abs(b.variance*b.dlc)-Math.abs(a.variance*a.dlc)),
    excessItems:excessItems.sort((a,b)=>(b.variance*b.dlc)-(a.variance*a.dlc)),
    deadItems:deadItems.sort((a,b)=>b.stockVal-a.stockVal),
    fastLow:fastLow.sort((a,b)=>a.coverDays-b.coverDays),
    categories,users,monthlyTotals,
    totalItems:S.items.length,
    countedItems:Object.keys(cMap).length,
    hasSales:!!(salesMeta&&salesMeta.totalRows>0),

    // ── NEW: Extended Financial Metrics ──────────────────
    // Inventory Turnover Ratio = Annual Sales Value / Average Inventory Value
    // Carrying Cost = 25% of inventory value per year (industry standard)
    // Monthly Carrying Cost = totalStockVal * 0.25 / 12
    get carryingCostMonthly(){ return Math.round(this.totalStockVal*0.25/12); },
    get carryingCostAnnual(){ return Math.round(this.totalStockVal*0.25); },

    // Fast moving revenue (parts with avgMonthly >= 2)
    get fastRevenue(){
      let r=0;
      S.items.forEach(i=>{
        const s=S_SALES_MAP[i.partNo];if(!s)return;
        const tot=Object.values(s).reduce((a,b)=>a+b,0);
        const months=Object.keys(s).length||1;
        const avg=tot/months;
        if(avg>=2)r+=tot*(parseFloat(i.dlc)||0);
      });
      return Math.round(r);
    },
    // Slow moving revenue
    get slowRevenue(){
      let r=0;
      S.items.forEach(i=>{
        const s=S_SALES_MAP[i.partNo];if(!s)return;
        const tot=Object.values(s).reduce((a,b)=>a+b,0);
        const months=Object.keys(s).length||1;
        const avg=tot/months;
        if(avg>0&&avg<2)r+=tot*(parseFloat(i.dlc)||0);
      });
      return Math.round(r);
    },
    // Total sales value from history
    get totalSalesValue(){
      let r=0;
      S.items.forEach(i=>{
        const s=S_SALES_MAP[i.partNo];if(!s)return;
        r+=Object.values(s).reduce((a,b)=>a+b,0)*(parseFloat(i.dlc)||0);
      });
      return Math.round(r);
    },
    // Inventory Turnover Ratio
    get turnoverRatio(){
      const sv=this.totalSalesValue;
      return sv&&totalStockVal?(sv/totalStockVal).toFixed(2):0;
    },
    // Days Inventory Outstanding
    get daysInventoryOutstanding(){
      const tr=parseFloat(this.turnoverRatio);
      return tr>0?Math.round(365/tr):0;
    },
    // Profit leakage = shortage loss + dead stock carrying cost + opportunity cost of excess
    get profitLeakage(){ return Math.round(shortVal + (deadVal*0.25/12) + (excessVal*0.15/12)); },
    // Monthly sales trend enriched with value
    get monthlyRevenueTrend(){
      const sm=S_SALES_META;
      const months=(sm?.months||[]).slice(-12);
      return months.map(m=>{
        let qty=0,val=0;
        S.items.forEach(i=>{
          const sm2=S_SALES_MAP[i.partNo];
          if(!sm2||!sm2[m])return;
          qty+=sm2[m];
          val+=sm2[m]*(parseFloat(i.dlc)||0);
        });
        return{month:m,qty:Math.round(qty),value:Math.round(val)};
      });
    }
  };
}

function generateCyclePlan(){
  const startDate=$('CC_SD')?.value||today();
  const days=parseInt($('CC_DAYS')?.value)||7;
  const pph=parseInt($('CC_PPH')?.value)||30;
  const strategy=$('CC_STRAT')?.value||'bin';
  const excl=($('CC_EXCL')?.value||'').split(',').map(s=>s.trim().toUpperCase()).filter(Boolean);

  let items=[...S.items].filter(i=>!excl.includes((i.bin||'').toUpperCase()));

  // Sort by strategy
  if(strategy==='bin'){
    items.sort((a,b)=>(a.bin||'ZZZ').localeCompare(b.bin||'ZZZ'));
  } else if(strategy==='value'){
    items.sort((a,b)=>(parseFloat(b.mrp)||0)-(parseFloat(a.mrp)||0));
  } else {
    // variance history — random shuffle (no history at planning time)
    items.sort(()=>Math.random()-0.5);
  }

  // Distribute across days
  const perDay=Math.ceil(items.length/days);
  const plan={startDate,totalItems:items.length,days:[],pph,strategy};
  for(let d=0;d<days;d++){
    const slice=items.slice(d*perDay,(d+1)*perDay);
    const dt=new Date(startDate);dt.setDate(dt.getDate()+d);
    plan.days.push({
      dayNum:d+1,
      date:dt.toISOString().split('T')[0],
      parts:slice.map(i=>({partNo:i.partNo,desc:i.desc||'',bin:i.bin||'',dms:i.systemQty||0}))
    });
  }

  saveCyclePlan(plan);
  toast(`✅ Plan created — ${items.length} parts across ${days} days`,'s',3000);
  rCyclePlan();
}

async function ccExport(){
  const plan=loadCyclePlan();if(!plan){toast('No plan found','w');return;}
  const counts=await fetchCounts();
  const countedParts=new Set(counts.map(c=>c.partNo));
  let csv='Day,Date,Part No,Description,Bin,DMS Qty,Status\n';
  plan.days.forEach(d=>{
    d.parts.forEach(p=>{
      csv+=`${d.dayNum},"${fmtD(d.date)}","${p.partNo}","${(p.desc||'').replace(/"/g,'""')}","${p.bin||''}",${p.dms},"${countedParts.has(p.partNo)?'Done':'Pending'}"\n`;
    });
  });
  dlCSV(csv,`cycle_count_plan_${today()}.csv`);
  toast('Plan exported','s');
}

async function pcStart(){
  try{
    // Stop any existing stream first
    if(PC.stream){PC.stream.getTracks().forEach(t=>t.stop());PC.stream=null;}
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:960}}
    });
    PC.stream=stream;
    PC.track=stream.getVideoTracks()[0];
    PC.blob=null;

    const vid=$('PC_VID');
    if(vid){vid.srcObject=stream;vid.style.display='block';vid.play().catch(()=>{});}
    $('PC_PLACEHOLDER') && ($('PC_PLACEHOLDER').style.display='none');
    $('PC_CVS') && ($('PC_CVS').style.display='none');
    $('PC_START') && ($('PC_START').style.display='none');
    $('PC_SNAP') && ($('PC_SNAP').style.display='inline-flex');
    $('PC_STOP') && ($('PC_STOP').style.display='inline-flex');
    $('PC_FORM') && ($('PC_FORM').style.display='none');
    const geo=$('PC_GEO');if(geo)geo.style.display='block';
    toast('Camera started — point at part/shelf and capture','i',3000);
  }catch(e){
    toast('Camera error: '+e.message+' — allow camera permission in browser','d',5000);
  }
}

function pcSnap(){
  const vid=$('PC_VID');const cvs=$('PC_CVS');if(!vid||!cvs||!PC.stream)return;
  // Flash
  const flash=$('PC_FLASH');if(flash){flash.style.opacity='1';setTimeout(()=>flash.style.opacity='0',150);}
  // Draw frame to canvas
  cvs.width=vid.videoWidth||640;cvs.height=vid.videoHeight||480;
  const ctx=cvs.getContext('2d');
  ctx.drawImage(vid,0,0);

  // Overlay geo + timestamp
  const geo=PC.coords;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,cvs.height-38,cvs.width,38);
  ctx.fillStyle='#ffffff';ctx.font='bold 13px monospace';ctx.textAlign='left';
  const ts=new Date().toLocaleString('en-IN');
  ctx.fillText(`📍 ${geo?`${geo.lat.toFixed(5)},${geo.lng.toFixed(5)}`:'No GPS'} · ${ts}`,10,cvs.height-14);

  // Convert to blob
  cvs.toBlob(blob=>{
    PC.blob=blob;
    vid.style.display='none';
    cvs.style.display='block';
    $('PC_SNAP').style.display='none';
    $('PC_RETAKE').style.display='inline-flex';
    $('PC_STOP').style.display='none';

    // Show form
    const form=$('PC_FORM');if(form)form.style.display='block';
    // Preview thumbnail
    const prev=$('PC_PREVIEW');
    if(prev){const url=URL.createObjectURL(blob);prev.innerHTML=`<img src="${url}" style="max-width:200px;border-radius:8px;border:1px solid #e2e8f0;">`;}
    // Update geo info
    const gt=$('PC_GEO_TXT');
    if(gt)gt.textContent=geo?`Lat: ${geo.lat.toFixed(6)}, Lng: ${geo.lng.toFixed(6)} · Accuracy: ±${Math.round(geo.acc)}m`:'GPS not available — photo will save without location';
    toast('Photo captured!','s',2000);
    form?.scrollIntoView({behavior:'smooth',block:'start'});
  },'image/jpeg',0.85);
}

function pcStop(){

function pcGetLocation(){
  if(!navigator.geolocation){PC.coords=null;return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    PC.coords={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
    const geo=$('PC_GEO');
    if(geo){geo.textContent=`📍 ${PC.coords.lat.toFixed(4)}, ${PC.coords.lng.toFixed(4)}`;geo.style.color='#4ade80';}
    const gt=$('PC_GEO_TXT');
    if(gt)gt.textContent=`Lat: ${PC.coords.lat.toFixed(6)}, Lng: ${PC.coords.lng.toFixed(6)} · ±${Math.round(PC.coords.acc)}m`;
  },err=>{
    PC.coords=null;
    const geo=$('PC_GEO');if(geo){geo.textContent='📍 GPS unavailable';geo.style.color='#f87171';}
  },{enableHighAccuracy:true,timeout:10000});
}

async function pcSave(){
  if(!PC.blob){toast('No photo captured','w');return;}
  const desc=($('PC_DESC')?.value||'').trim();
  if(!desc){toast('Enter a description','w');return;}
  const btn=$('PC_SAVE_BTN');if(btn){btn.disabled=true;btn.textContent='Saving…';}

  try{
    // Convert blob to base64
    const b64=await new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=e=>resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(PC.blob);
    });
    const payload={
      action:'savePhoto',
      photo:{
        id:uid(),
        partNo:$('PC_PN')?.value||'',
        bin:$('PC_BIN')?.value||'',
        desc,
        photoType:$('PC_TYPE')?.value||'General Audit',
        date:today(),
        time:nowt(),
        auditor:S.user.username,
        auditorName:S.user.name,
        lat:PC.coords?.lat||'',
        lng:PC.coords?.lng||'',
        accuracy:PC.coords?.acc||'',
        imageBase64:b64
      }
    };
    const r=await api(payload);
    if(r.success){
      toast('✅ Photo saved to Google Sheet!','s',3000);
      pcStop();
      pcLoadLog();
      // Clear form
      ['PC_PN','PC_DESC'].forEach(id=>{const el=$(id);if(el)el.value='';});
      if($('PC_BIN'))$('PC_BIN').value='';
    } else {
      toast('Failed: '+(r.error||'Unknown error'),'d',4000);
    }
  }catch(e){
    toast('Error: '+e.message,'d',4000);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='💾 Save Photo to Sheet';}
  }
}

// BUILT-IN INTELLIGENCE ENGINE — 100% local, zero external AI
// Analyses live S.items, counts, sales in real-time
// ══════════════════════════════════════════════════════════

function imSnap(){
  const counts=S.allCounts||S.counts||[];
  const today_s=today();
  const todayCounts=counts.filter(c=>c.date===today_s);
  // Mode-based final count per part
  const puMap={};
  counts.forEach(c=>{
    if(!puMap[c.partNo])puMap[c.partNo]={};
    const ex=puMap[c.partNo][c.auditor];
    if(!ex||c.time>ex.time) puMap[c.partNo][c.auditor]=c;
  });
  const cMap={};
  Object.entries(puMap).forEach(([pn,byU])=>{
    const vals=Object.values(byU).map(e=>parseInt(e.qty)||0);
    const freq={};vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
    let mode=vals[0],maxF=0;
    Object.entries(freq).forEach(([v,f])=>{if(parseInt(f)>maxF){maxF=parseInt(f);mode=parseInt(v);}});
    cMap[pn]=mode;
  });

  let totalStockVal=0,shortVal=0,excessVal=0,deadVal=0;
  let shortCount=0,excessCount=0,matchCount=0,deadCount=0;
  const shortParts=[],excessParts=[],deadParts=[],fastLow=[],binMap={};

  S.items.forEach(item=>{
    const pn=item.partNo;
    const sysQty=parseFloat(item.systemQty)||0;
    const dlc=parseFloat(item.dlc)||0;
    const mrp=parseFloat(item.mrp)||0;
    const stockVal=sysQty*dlc;
    totalStockVal+=stockVal;
    const sm=(typeof S_SALES_MAP!=='undefined'&&S_SALES_MAP[pn])?Object.values(S_SALES_MAP[pn]):[];
    const totalSales=sm.reduce((a,b)=>a+b,0);
    const avgM=sm.length?totalSales/sm.length:0;
    const cvDays=avgM>0?Math.round(sysQty/(avgM/30)):null;
    if(totalSales===0&&sysQty>0){deadCount++;deadVal+=stockVal;deadParts.push({pn,desc:item.desc||'',bin:item.bin||'',sysQty,dlc,mrp,stockVal});}
    if(avgM>0&&cvDays!==null&&cvDays<30)fastLow.push({pn,desc:item.desc||'',bin:item.bin||'',sysQty,avgM,cvDays,dlc,mrp});
    const physQty=cMap[pn]!==undefined?cMap[pn]:null;
    const variance=physQty!==null?physQty-sysQty:null;
    if(variance!==null){
      if(variance<0){shortCount++;shortVal+=Math.abs(variance)*dlc;shortParts.push({pn,desc:item.desc||'',bin:item.bin||'',sysQty,physQty,variance,dlc,mrp,loss:Math.round(Math.abs(variance)*dlc)});}
      else if(variance>0){excessCount++;excessVal+=variance*dlc;excessParts.push({pn,desc:item.desc||'',bin:item.bin||'',sysQty,physQty,variance,dlc,mrp,exVal:Math.round(variance*dlc)});}
      else matchCount++;
    }
    if(item.bin){
      if(!binMap[item.bin])binMap[item.bin]={total:0,counted:0,short:0,excess:0};
      binMap[item.bin].total++;
      if(physQty!==null)binMap[item.bin].counted++;
      if(variance!==null&&variance<0)binMap[item.bin].short++;
      if(variance!==null&&variance>0)binMap[item.bin].excess++;
    }
  });
  const uCounted=new Set(todayCounts.map(c=>c.partNo)).size;
  const pct=S.items.length?Math.round(uCounted/S.items.length*100):0;
  const mPct=uCounted?Math.round(matchCount/uCounted*100):0;
  const up=typeof getUserPerf==='function'?getUserPerf():{};
  const users=Object.entries(up).map(([u,d])=>({u,total:d.totalCounts||0,errors:d.errorCounts||0,acc:d.totalCounts?Math.round(((d.totalCounts-(d.errorCounts||0))/d.totalCounts)*100):100})).sort((a,b)=>b.total-a.total);
  const teamAvgAcc=users.length?Math.round(users.reduce((s,u)=>s+u.acc,0)/users.length):0;
  const activeToday=[...new Set(todayCounts.map(c=>c.auditorName||c.auditor))];
  return{
    today_s,totalStockVal,shortVal,excessVal,deadVal,
    shortCount,excessCount,matchCount,deadCount,
    shortParts:shortParts.sort((a,b)=>b.loss-a.loss),
    excessParts:excessParts.sort((a,b)=>b.exVal-a.exVal),
    deadParts:deadParts.sort((a,b)=>b.stockVal-a.stockVal),
    fastLow:fastLow.sort((a,b)=>a.cvDays-b.cvDays),
    binMap,uCounted,pct,mPct,users,teamAvgAcc,activeToday,
    totalItems:S.items.length
  };
}

  // ── TABLE BUILDER ──────────────────────
  const TB=(hds,rows,max=12)=>{
    if(!rows.length)return`<div style="color:#94a3b8;font-size:12px;padding:6px 0">No data found.</div>`;
    return`<div style="overflow-x:auto;margin-top:8px"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px">
      <thead><tr>${hds.map(h=>`<th style="background:#f8fafc;padding:6px 10px;text-align:left;border-bottom:2px solid #e2e8f0;font-weight:700;color:#475569;white-space:nowrap">${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.slice(0,max).map((row,i)=>`<tr style="border-bottom:1px solid #f1f5f9;background:${i%2?'#fafbfc':'#fff'}">${row.map(c=>`<td style="padding:6px 10px">${c}</td>`).join('')}</tr>`).join('')}</tbody>
      ${rows.length>max?`<tfoot><tr><td colspan="${hds.length}" style="padding:5px 10px;font-size:10px;color:#94a3b8;text-align:center">+${rows.length-max} more rows</td></tr></tfoot>`:''}
    </table></div>`;
  };

  const PN=p=>`<span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#2563eb">${p}</span>`;
  const BIN=b=>`<span style="background:#eff6ff;color:#2563eb;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700">${b||'—'}</span>`;

  // ── 1. AUDIT PROGRESS ─────────────────
  if(/progress|audit.*status|kitna|hua|complete|count|counted|aaj ka|today|kya ban/i.test(ql)){
    const rem=snap.totalItems-snap.uCounted;
    const statusMsg=snap.pct>=80?'🟢 Audit is on track — excellent progress!':snap.pct>=50?'🟡 Good progress, keep going.':'🔴 Audit is behind schedule. Push the team!';
    return SR([
      {val:snap.pct+'%',lbl:'Audit Complete',c:'#2563eb',bg:'#eff6ff',bd:'#bfdbfe',lc:'#1e40af'},
      {val:n(snap.uCounted),lbl:'Parts Counted',c:'#059669',bg:'#ecfdf5',bd:'#a7f3d0',lc:'#065f46'},
      {val:n(rem),lbl:'Remaining',c:'#d97706',bg:'#fffbeb',bd:'#fde68a',lc:'#92400e'},
      {val:snap.mPct+'%',lbl:'Accuracy',c:'#7c3aed',bg:'#f5f3ff',bd:'#c4b5fd',lc:'#5b21b6'}
    ])+`<div style="margin-top:8px;font-size:12px;color:#475569;line-height:1.7">
      ${statusMsg}<br>
      <strong>${snap.activeToday.length}</strong> staff active today · <strong>${snap.matchCount}</strong> matched · <strong>${snap.shortCount}</strong> short · <strong>${snap.excessCount}</strong> excess
    </div>`;
  }

  // ── 2. FINANCIAL IMPACT ───────────────
  if(/financial|money|rupee|loss|value|paisa|nuks|impact|kitna.*nuksaan/i.test(ql)){
    const net=snap.shortVal+snap.excessVal+snap.deadVal;
    return SR([
      {val:r(snap.totalStockVal),lbl:'Total Stock Value',c:'#c8922a',bg:'#fffbeb',bd:'#f0e0a0',lc:'#92400e'},
      {val:r(snap.shortVal),lbl:'Shortage Loss',c:'#dc2626',bg:'#fef2f2',bd:'#fecaca',lc:'#991b1b'},
      {val:r(snap.excessVal),lbl:'Excess Blocked',c:'#d97706',bg:'#fffbeb',bd:'#fde68a',lc:'#92400e'},
      {val:r(snap.deadVal),lbl:'Dead Stock',c:'#7c3aed',bg:'#f5f3ff',bd:'#c4b5fd',lc:'#5b21b6'}
    ])+`<div style="font-size:12px;color:#475569;margin-top:8px;line-height:1.7">
      Total financial exposure: <strong>${r(net)}</strong><br>
      ${snap.shortVal>50000?'🚨 Shortage value is HIGH — immediate investigation needed.':snap.shortVal>10000?'⚠️ Moderate shortage — verify high-value parts.':'✅ Shortage value is manageable.'}
    </div>`;
  }

  // ── 3. SHORT PARTS ────────────────────
  if(/short|kam|missing|shortage|kaunse.*short|short.*list|variance.*short/i.test(ql)){
    return `<div style="font-size:12px;font-weight:700;color:#dc2626;margin-bottom:8px">🔻 ${snap.shortCount} parts short — Total loss: ${r(snap.shortVal)}</div>`
    +TB(['Part No','Description','Bin','DMS','Physical','Short','Loss ₹'],
      snap.shortParts.slice(0,15).map(p=>[PN(p.pn),`<span style="font-size:10px">${(p.desc||'—').slice(0,20)}</span>`,BIN(p.bin),
        `<b>${p.sysQty}</b>`,`<span style="color:#059669;font-weight:700">${p.physQty}</span>`,
        `<span style="color:#dc2626;font-weight:800">${p.variance}</span>`,
        `<span style="color:#dc2626;font-weight:700">${r(p.loss)}</span>`]));
  }

  // ── 4. EXCESS PARTS ───────────────────
  if(/excess|zyada|extra|surplus|excess.*list/i.test(ql)){
    return `<div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:8px">🔺 ${snap.excessCount} parts excess — Value: ${r(snap.excessVal)}</div>`
    +TB(['Part No','Description','Bin','DMS','Physical','Excess','Value ₹'],
      snap.excessParts.slice(0,15).map(p=>[PN(p.pn),`<span style="font-size:10px">${(p.desc||'—').slice(0,20)}</span>`,BIN(p.bin),
        `<b>${p.sysQty}</b>`,`<span style="color:#059669;font-weight:700">${p.physQty}</span>`,
        `<span style="color:#d97706;font-weight:800">+${p.variance}</span>`,
        `<span style="color:#d97706;font-weight:700">${r(p.exVal)}</span>`]));
  }

  // ── 5. DEAD STOCK ─────────────────────
  if(/dead|bandh|zero.*sale|no.*movement|deadstock|dead.*stock/i.test(ql)){
    return `<div style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px">💀 ${snap.deadCount} dead stock parts — ${r(snap.deadVal)} capital locked</div>`
    +TB(['Part No','Description','Bin','Qty','Value Locked'],
      snap.deadParts.slice(0,15).map(p=>[PN(p.pn),`<span style="font-size:10px">${(p.desc||'—').slice(0,22)}</span>`,BIN(p.bin),
        `<b>${n(p.sysQty)}</b>`,`<span style="color:#7c3aed;font-weight:700">${r(p.stockVal)}</span>`]))
    +`<div style="font-size:11px;color:#64748b;margin-top:8px;padding:8px 12px;background:#f5f3ff;border-radius:8px">💡 Recommend: supplier return, promotion campaign, or write-off review for items older than 12 months.</div>`;
  }

  // ── 6. REORDER / FAST MOVING ─────────
  if(/reorder|order karna|order.*chahiye|fast.*moving|cover|khatam|urgent.*order/i.test(ql)){
    return `<div style="font-size:12px;font-weight:700;color:#d97706;margin-bottom:8px">⚡ ${snap.fastLow.length} parts need reorder (< 30 days stock cover)</div>`
    +TB(['Part No','Description','Bin','Stock','Avg/Month','Cover','Reorder Qty'],
      snap.fastLow.slice(0,15).map(p=>{
        const rq=Math.ceil(p.avgM*2);
        const uc=p.cvDays<7?'#dc2626':p.cvDays<15?'#d97706':'#059669';
        return[PN(p.pn),`<span style="font-size:10px">${(p.desc||'—').slice(0,18)}</span>`,BIN(p.bin),
          `<b>${n(p.sysQty)}</b>`,`<span style="color:#059669;font-weight:700">${p.avgM.toFixed(1)}</span>`,
          `<span style="color:${uc};font-weight:800">${p.cvDays}d</span>`,
          `<span style="color:#2563eb;font-weight:800">${rq}</span>`];
      }));
  }

  // ── 7. BIN PROGRESS ──────────────────
  if(/bin|location|rack|jagah|bins.*progress|bin.*count/i.test(ql)){
    const bins=Object.entries(snap.binMap).map(([b,v])=>({b,pct:v.total?Math.round(v.counted/v.total*100):0,...v})).sort((a,b2)=>a.pct-b2.pct);
    const notStarted=bins.filter(b=>b.pct===0);
    const done=bins.filter(b=>b.pct===100);
    const prob=bins.filter(b=>b.short>0).sort((a,b2)=>b2.short-a.short).slice(0,5);
    return SR([
      {val:S.bins.length,lbl:'Total Bins',c:'#0f172a'},
      {val:done.length,lbl:'Fully Done',c:'#059669',bg:'#ecfdf5',bd:'#a7f3d0',lc:'#065f46'},
      {val:notStarted.length,lbl:'Not Started',c:'#dc2626',bg:'#fef2f2',bd:'#fecaca',lc:'#991b1b'}
    ])+(notStarted.length?`<div style="font-size:11px;font-weight:700;color:#dc2626;margin:8px 0 4px">⏳ Bins not started:</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">${notStarted.slice(0,14).map(b=>`<span style="background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">${b.b}</span>`).join('')}${notStarted.length>14?`<span style="font-size:10px;color:#94a3b8">+${notStarted.length-14} more</span>`:''}</div>`:'')
    +(prob.length?`<div style="font-size:11px;font-weight:700;color:#d97706;margin-bottom:4px">⚠️ Most shortage bins:</div>`+TB(['Bin','Total Parts','Short'],prob.map(b=>[`<b style="color:#2563eb">${b.b}</b>`,n(b.total),`<span style="color:#dc2626;font-weight:700">${b.short}</span>`])):'');
  }

  // ── 8. TEAM PERFORMANCE ──────────────
  if(/team|user|staff|kaun.*accha|best|performance|accuracy|error|galti|worker/i.test(ql)){
    return SR([
      {val:snap.users.length,lbl:'Team Members',c:'#0f172a'},
      {val:snap.activeToday.length,lbl:'Active Today',c:'#2563eb',bg:'#eff6ff',bd:'#bfdbfe',lc:'#1e40af'},
      {val:snap.teamAvgAcc+'%',lbl:'Avg Accuracy',c:'#059669',bg:'#ecfdf5',bd:'#a7f3d0',lc:'#065f46'}
    ])+TB(['User','Entries','Errors','Accuracy'],
      snap.users.slice(0,8).map(u=>{
        const ac=u.acc>=90?'#059669':u.acc>=75?'#d97706':'#dc2626';
        return[`<b>${u.u}</b>`,`<span style="font-family:'JetBrains Mono',monospace;font-weight:700">${u.total}</span>`,
          `<span style="color:#dc2626;font-weight:700">${u.errors}</span>`,
          `<span style="font-weight:800;color:${ac}">${u.acc}%</span>`];
      }));
  }

  // ── 9. HIGH VALUE RISK ───────────────
  if(/high.*value|expensive|costly|mahnga|mehenga|top.*value|risk.*part/i.test(ql)){
    const hv=snap.shortParts.filter(p=>p.mrp>500);
    return `<div style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px">💎 ${hv.length} high-value parts (MRP > ₹500) are short</div>`
    +TB(['Part No','Description','MRP','Short Units','Loss ₹'],
      hv.slice(0,12).map(p=>[PN(p.pn),`<span style="font-size:10px">${(p.desc||'—').slice(0,20)}</span>`,
        `<b>₹${n(p.mrp)}</b>`,`<span style="color:#dc2626;font-weight:800">${p.variance}</span>`,
        `<span style="color:#dc2626;font-weight:700">${r(p.loss)}</span>`]));
  }

  // ── 10. PART LOOKUP ──────────────────
  const pu=S.items.find(i=>(i.partNo||'').toUpperCase().includes(q.toUpperCase().replace(/[^A-Z0-9]/gi,'')))||(q.length>3?S.items.find(i=>(i.desc||'').toLowerCase().includes(ql)):null);
  if(pu){
    const counts2=S.allCounts||S.counts||[];
    const partCounts=counts2.filter(c=>c.partNo===pu.partNo&&c.date===today());
    const counted=partCounts.length?Math.max(...partCounts.map(c=>parseInt(c.qty)||0)):null;
    const variance=counted!==null?counted-(parseFloat(pu.systemQty)||0):null;
    const dlc=parseFloat(pu.dlc)||0;
    return SR([
      {val:n(parseFloat(pu.systemQty)||0),lbl:'DMS Stock',c:'#2563eb',bg:'#eff6ff',bd:'#bfdbfe',lc:'#1e40af'},
      {val:counted!==null?n(counted):'—',lbl:'Physical',c:variance===null?'#94a3b8':variance===0?'#059669':variance<0?'#dc2626':'#d97706',bg:variance===null?'#f8fafc':variance===0?'#ecfdf5':variance<0?'#fef2f2':'#fffbeb',bd:variance===null?'#e2e8f0':variance===0?'#a7f3d0':variance<0?'#fecaca':'#fde68a'},
      {val:'₹'+n(parseFloat(pu.mrp)||0),lbl:'MRP',c:'#c8922a'}
    ])+`<div style="font-size:12px;color:#475569;margin-top:4px;line-height:1.8">
      <strong>${esc(pu.partNo)}</strong> — ${esc(pu.desc||'—')}<br>
      Bin: <strong>${pu.bin||'—'}</strong> · Category: <strong>${pu.category||'—'}</strong><br>
      DLC: <strong>₹${n(dlc)}</strong> · Stock Value: <strong>${r((parseFloat(pu.systemQty)||0)*dlc)}</strong><br>
      ${variance!==null?`Variance: <strong style="color:${variance===0?'#059669':variance<0?'#dc2626':'#d97706'}">${variance===0?'✅ Match':variance<0?`🔻 Short ${Math.abs(variance)}`:`🔺 Excess +${variance}`}</strong>`:'<span style="color:#94a3b8">Not counted today</span>'}
    </div>`;
  }

  // ── 11. FULL SUMMARY ─────────────────
  if(/summary|poora|puri.*report|full.*report|overall|sab.*kuch|bata.*de|kya.*chal|overview/i.test(ql)){
    return imFullSummary(snap);
  }

  // ── 12. HELP / DEFAULT ───────────────
  return `<div style="font-size:13px;color:#475569;line-height:1.8">
    <strong>🧠 India Motors Intelligence Engine</strong><br>
    <span style="font-size:11px;color:#94a3b8">Ask me anything about your inventory. Try these:</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">
      ${[['📊 Audit progress','progress'],['💰 Financial impact','financial'],['🔻 Short parts list','short parts'],
        ['🔺 Excess parts','excess'],['💀 Dead stock','dead stock'],['⚡ Reorder alert','reorder'],
        ['📍 Bin progress','bins'],['👥 Team accuracy','team'],['💎 High value risk','high value'],
        ['📋 Full summary','summary']
      ].map(([lbl,chip])=>`<button onclick="document.getElementById('AIC_INP').value='${chip}';aiSend()" style="padding:6px 10px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;text-align:left;font-size:11px;font-weight:600;color:#475569;transition:.15s" onmouseover="this.style.borderColor='#2563eb';this.style.color='#2563eb'" onmouseout="this.style.borderColor='#e2e8f0';this.style.color='#475569'">${lbl}</button>`).join('')}
    </div>
    <div style="margin-top:10px;font-size:11px;color:#94a3b8">💡 Or type any part number to look it up instantly</div>
  </div>`;
}

function imFullSummary(snap){
  const r=n=>'₹'+Math.round(n).toLocaleString('en-IN');
  const n=n=>(parseFloat(n)||0).toLocaleString('en-IN');
  return `<div style="font-size:13px;color:#0f172a;line-height:1.9">
    <div style="font-weight:800;font-size:14px;border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin-bottom:12px">
      📊 India Motors — Full Inventory Report<br>
      <span style="font-size:11px;font-weight:500;color:#64748b">${snap.today_s} · Hero MotoCorp Dealer · Alwar, Rajasthan</span>
    </div>
    <b>1. Audit Progress</b><br>
    ${n(snap.uCounted)} of ${n(snap.totalItems)} parts (${snap.pct}%) counted.
    ${snap.matchCount} matched · ${snap.shortCount} short · ${snap.excessCount} excess.
    ${snap.pct>=80?'🟢 On track.':snap.pct>=50?'🟡 Keep going.':'🔴 Behind — escalate!'}<br><br>
    <b>2. Financial Position</b><br>
    Total stock: <strong style="color:#c8922a">${r(snap.totalStockVal)}</strong> ·
    Shortage loss: <strong style="color:#dc2626">${r(snap.shortVal)}</strong> ·
    Excess: <strong style="color:#d97706">${r(snap.excessVal)}</strong> ·
    Dead stock: <strong style="color:#7c3aed">${r(snap.deadVal)}</strong><br><br>
    <b>3. Key Risks</b><br>
    ${snap.shortParts.length?`🔻 Biggest shortage: <strong>${snap.shortParts[0].pn}</strong> — ${(snap.shortParts[0].desc||'').slice(0,30)} (loss: ${r(snap.shortParts[0].loss)})<br>`:'✅ No major shortages<br>'}
    ${snap.fastLow.length?`⚡ Critical reorder: <strong>${snap.fastLow[0].pn}</strong> — only ${snap.fastLow[0].cvDays} days cover<br>`:''}
    ${snap.deadVal>100000?`💀 ${r(snap.deadVal)} locked in dead stock<br>`:''}<br>
    <b>4. Immediate Actions</b><br>
    ${snap.shortParts.slice(0,3).map((p,i)=>`${i+1}. Investigate <strong>${p.pn}</strong> — ${Math.abs(p.variance)} units short, ${r(p.loss)} loss<br>`).join('')}
    ${snap.fastLow.length?`${snap.shortParts.slice(0,3).length+1}. Reorder: ${snap.fastLow.slice(0,3).map(p=>p.pn).join(', ')}<br>`:''}<br>
    <b>5. Recommendation</b><br>
    ${snap.shortVal>snap.excessVal
      ?`Shortage loss (${r(snap.shortVal)}) > excess. Audit DMS billing entries immediately. Focus on high-value parts first.`
      :`Excess (${r(snap.excessVal)}) is higher. Return excess to supplier or run promotion. Clearing dead stock can free ${r(snap.deadVal)}.`}
  </div>`;
}

function aiSend(){
  const inp=$('AIC_INP');const msgs=$('AIC_MSGS');const btn=$('AIC_SEND');
  if(!inp||!msgs)return;
  const text=(inp.value||'').trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  msgs.innerHTML+=aiMsg('user',esc(text));
  msgs.scrollTop=msgs.scrollHeight;
  if(btn){btn.disabled=true;btn.textContent='…';}
  setTimeout(()=>{
    try{
      const snap=imSnap();
      const reply=imReply(text,snap);
      msgs.innerHTML+=aiMsg('assistant',reply);
    }catch(e){
      msgs.innerHTML+=aiMsg('assistant','❌ Engine error: '+esc(e.message));
    }
    msgs.scrollTop=msgs.scrollHeight;
    if(btn){btn.disabled=false;btn.textContent='Send ↑';}
    inp.focus();
  },60);
}
